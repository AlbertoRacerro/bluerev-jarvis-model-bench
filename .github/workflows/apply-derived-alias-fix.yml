name: Apply derived 64K alias fix

on:
  pull_request:
    paths:
      - .github/workflows/apply-derived-alias-fix.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'fix/bench2-canary-derived-64k-alias' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/bench2-canary-derived-64k-alias
          fetch-depth: 0
      - name: Apply reviewed runtime alias patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib
          import re

          runtime = Path('scripts/run_bench2_hermes_canary.py')
          text = runtime.read_text(encoding='utf-8')

          anchor = '''    return model\n\n\ndef _candidate_payload(case: dict[str, Any]) -> dict[str, Any]:\n'''
          addition = '''    return model\n\n\ndef _runtime_alias_name() -> str:\n    run_id = re.sub(r"[^0-9]", "", os.environ.get("GITHUB_RUN_ID", "")) or "local"\n    attempt = re.sub(r"[^0-9]", "", os.environ.get("GITHUB_RUN_ATTEMPT", "")) or "0"\n    return f"bench2-canary-qwythos-safe-64k:{run_id}-{attempt}"\n\n\ndef _runtime_modelfile(source_model: str) -> str:\n    return f"FROM {source_model}\\nPARAMETER num_ctx 65536\\n"\n\n\ndef _remove_model_if_present(model_name: str) -> dict[str, Any]:\n    before = [\n        item for item in residency.list_installed_models()\n        if item.get("name") == model_name\n    ]\n    result: dict[str, Any] | None = None\n    if before:\n        result = _run(["ollama", "rm", model_name], timeout=120)\n    after = [\n        item for item in residency.list_installed_models()\n        if item.get("name") == model_name\n    ]\n    return {\n        "model_name": model_name,\n        "present_before": len(before) == 1,\n        "remove_returncode": result.get("returncode") if result else None,\n        "verified_absent": not after,\n    }\n\n\ndef _create_runtime_alias(candidate: dict[str, Any], runtime_root: Path) -> dict[str, Any]:\n    alias = _runtime_alias_name()\n    stale_cleanup = _remove_model_if_present(alias)\n    if stale_cleanup.get("verified_absent") is not True:\n        raise CanaryRuntimeError("stale canary runtime alias could not be removed")\n    modelfile = runtime_root / "Canary.Modelfile"\n    modelfile.write_text(\n        _runtime_modelfile(candidate["name"]),\n        encoding="utf-8",\n        newline="\\n",\n    )\n    create = _run(["ollama", "create", alias, "-f", str(modelfile)], timeout=600)\n    if create.get("ok") is not True:\n        detail = str(create.get("stderr") or create.get("stdout") or "")[-500:]\n        raise CanaryRuntimeError(f"temporary 64K Ollama alias creation failed: {detail}")\n    parameters = _run(["ollama", "show", alias, "--parameters"], timeout=60)\n    parameters_text = str(parameters.get("stdout") or "")\n    if parameters.get("ok") is not True or re.search(\n        r"(?mi)^\\s*num_ctx\\s+65536\\s*$", parameters_text\n    ) is None:\n        raise CanaryRuntimeError("temporary Ollama alias does not expose num_ctx 65536")\n    matches = [\n        item for item in residency.list_installed_models()\n        if item.get("name") == alias\n    ]\n    if len(matches) != 1:\n        raise CanaryRuntimeError("temporary Ollama alias is missing or duplicated")\n    model = matches[0]\n    return {\n        "name": alias,\n        "digest": model.get("digest"),\n        "size": model.get("size"),\n        "source_candidate_name": candidate["name"],\n        "source_candidate_digest": candidate["digest"],\n        "modelfile_sha256": hashlib.sha256(modelfile.read_bytes()).hexdigest(),\n        "parameters": parameters_text.strip(),\n        "stale_cleanup": stale_cleanup,\n    }\n\n\ndef _candidate_payload(case: dict[str, Any]) -> dict[str, Any]:\n'''
          if text.count(anchor) != 1:
              raise SystemExit('runtime alias insertion anchor mismatch')
          text = text.replace(anchor, addition)

          old = '''    tool_trace: Path,\n    hermes_repo: Path,\n) -> tuple[dict[str, str], list[str]]:\n'''
          new = '''    tool_trace: Path,\n    hermes_repo: Path,\n    runtime_model: str,\n) -> tuple[dict[str, str], list[str]]:\n'''
          if text.count(old) != 1:
              raise SystemExit('environment signature anchor mismatch')
          text = text.replace(old, new)
          old = '''        "HERMES_INFERENCE_MODEL": contract.EXPECTED_CANDIDATE["model_tag"],'''
          new = '''        "HERMES_INFERENCE_MODEL": runtime_model,'''
          if text.count(old) != 1:
              raise SystemExit('environment model anchor mismatch')
          text = text.replace(old, new)

          old = '''    candidate: dict[str, Any] | None = None\n    process: dict[str, Any] = {'''
          new = '''    candidate: dict[str, Any] | None = None\n    runtime_alias: dict[str, Any] | None = None\n    alias_cleanup: dict[str, Any] = {"attempted": False, "verified_absent": False}\n    process: dict[str, Any] = {'''
          if text.count(old) != 1:
              raise SystemExit('capture variable anchor mismatch')
          text = text.replace(old, new)

          old = '''        tool_trace_path = runtime_root / "tool-trace.jsonl"\n        usage_path = runtime_root / "usage.json"\n        _write_isolated_home(hermes_home, workdir, candidate["name"])\n        env, removed_credential_names = sanitized_subprocess_environment(\n            hermes_home=hermes_home,\n            tool_trace=tool_trace_path,\n            hermes_repo=hermes_repo,\n        )\n'''
          new = '''        tool_trace_path = runtime_root / "tool-trace.jsonl"\n        usage_path = runtime_root / "usage.json"\n        runtime_alias = _create_runtime_alias(candidate, runtime_root)\n        _write_isolated_home(hermes_home, workdir, runtime_alias["name"])\n        env, removed_credential_names = sanitized_subprocess_environment(\n            hermes_home=hermes_home,\n            tool_trace=tool_trace_path,\n            hermes_repo=hermes_repo,\n            runtime_model=runtime_alias["name"],\n        )\n'''
          if text.count(old) != 1:
              raise SystemExit('runtime setup anchor mismatch')
          text = text.replace(old, new)

          old = '''            "--model", candidate["name"],'''
          new = '''            "--model", runtime_alias["name"],'''
          if text.count(old) != 1:
              raise SystemExit('command model anchor mismatch')
          text = text.replace(old, new)

          old = '''        usage, usage_checks = _validate_usage(output_dir / "usage.json", candidate["name"])\n\n        runtime_model = residency._find_single_running_model(candidate)\n'''
          new = '''        usage, usage_checks = _validate_usage(output_dir / "usage.json", runtime_alias["name"])\n\n        runtime_model = residency._find_single_running_model({\n            "name": runtime_alias["name"],\n            "digest": runtime_alias["digest"],\n        })\n'''
          if text.count(old) != 1:
              raise SystemExit('usage/runtime model anchor mismatch')
          text = text.replace(old, new)

          old = '''    finally:\n        try:\n            cleanup_after = stop_all_running_models()\n        except Exception as exc:\n            detail = f"cleanup failed: {type(exc).__name__}: {exc}"\n            if infrastructure_error is None:\n                infrastructure_error = {"type": type(exc).__name__, "detail": detail}\n            else:\n                infrastructure_error["detail"] += "; " + detail\n        if runtime_root is not None:\n            shutil.rmtree(runtime_root, ignore_errors=True)\n'''
          new = '''    finally:\n        try:\n            cleanup_after = stop_all_running_models()\n            if runtime_alias is not None:\n                alias_cleanup = {\n                    "attempted": True,\n                    **_remove_model_if_present(runtime_alias["name"]),\n                }\n                if alias_cleanup.get("verified_absent") is not True:\n                    raise CanaryRuntimeError("temporary Ollama alias cleanup failed")\n        except Exception as exc:\n            detail = f"cleanup failed: {type(exc).__name__}: {exc}"\n            if infrastructure_error is None:\n                infrastructure_error = {"type": type(exc).__name__, "detail": detail}\n            else:\n                infrastructure_error["detail"] += "; " + detail\n        if runtime_root is not None:\n            shutil.rmtree(runtime_root, ignore_errors=True)\n'''
          if text.count(old) != 1:
              raise SystemExit('cleanup anchor mismatch')
          text = text.replace(old, new)

          old = '''        "candidate": candidate,\n        "endpoint": "http://127.0.0.1:11434/v1",'''
          new = '''        "candidate": candidate,\n        "runtime_alias": runtime_alias,\n        "alias_cleanup": alias_cleanup,\n        "endpoint": "http://127.0.0.1:11434/v1",'''
          if text.count(old) != 1:
              raise SystemExit('fingerprint alias anchor mismatch')
          text = text.replace(old, new)

          old = '''        "candidate": candidate,\n        "case_id": contract.EXPECTED_CASE["case_id"],'''
          new = '''        "candidate": candidate,\n        "runtime_alias": runtime_alias,\n        "alias_cleanup": alias_cleanup,\n        "case_id": contract.EXPECTED_CASE["case_id"],'''
          if text.count(old) != 1:
              raise SystemExit('report alias anchor mismatch')
          text = text.replace(old, new)

          old = '''        if report["candidate"].get("digest") != contract.EXPECTED_CANDIDATE["digest"]:\n            raise CanaryRuntimeError("canary candidate digest drifted")\n        if report.get("infrastructure_error") is not None or report.get("infrastructure_valid") is not True:\n'''
          new = '''        if report["candidate"].get("digest") != contract.EXPECTED_CANDIDATE["digest"]:\n            raise CanaryRuntimeError("canary candidate digest drifted")\n        runtime_alias = report.get("runtime_alias")\n        if not isinstance(runtime_alias, dict):\n            raise CanaryRuntimeError("canary runtime alias evidence is missing")\n        if runtime_alias.get("source_candidate_name") != contract.EXPECTED_CANDIDATE["model_tag"]:\n            raise CanaryRuntimeError("canary runtime alias source name drifted")\n        if runtime_alias.get("source_candidate_digest") != contract.EXPECTED_CANDIDATE["digest"]:\n            raise CanaryRuntimeError("canary runtime alias source digest drifted")\n        if report.get("alias_cleanup", {}).get("verified_absent") is not True:\n            raise CanaryRuntimeError("canary runtime alias was not removed")\n        if report.get("infrastructure_error") is not None or report.get("infrastructure_valid") is not True:\n'''
          if text.count(old) != 1:
              raise SystemExit('enforce alias anchor mismatch')
          text = text.replace(old, new)

          old = '''        if report.get("runtime_model", {}).get("context_length") != 65536:\n            raise CanaryRuntimeError("canary runtime context is not 65536")\n'''
          new = '''        if report.get("runtime_model", {}).get("name") != runtime_alias.get("name"):\n            raise CanaryRuntimeError("canary runtime model alias drifted")\n        if report.get("runtime_model", {}).get("digest") != runtime_alias.get("digest"):\n            raise CanaryRuntimeError("canary runtime alias digest drifted")\n        if report.get("runtime_model", {}).get("context_length") != 65536:\n            raise CanaryRuntimeError("canary runtime context is not 65536")\n'''
          if text.count(old) != 1:
              raise SystemExit('runtime alias identity anchor mismatch')
          text = text.replace(old, new)

          old = '''        if fingerprint.get("hermes", {}).get("commit_sha") != contract.bench2.EXPECTED_HERMES_COMMIT:\n            raise CanaryRuntimeError("canary Hermes identity drifted")\n        if usage.get("provider") != "custom" or usage.get("model") != contract.EXPECTED_CANDIDATE["model_tag"]:\n            raise CanaryRuntimeError("canary usage provider/model binding drifted")\n'''
          new = '''        if fingerprint.get("hermes", {}).get("commit_sha") != contract.bench2.EXPECTED_HERMES_COMMIT:\n            raise CanaryRuntimeError("canary Hermes identity drifted")\n        if fingerprint.get("runtime_alias") != runtime_alias:\n            raise CanaryRuntimeError("canary runtime alias fingerprint drifted")\n        if usage.get("provider") != "custom" or usage.get("model") != runtime_alias.get("name"):\n            raise CanaryRuntimeError("canary usage provider/runtime alias binding drifted")\n'''
          if text.count(old) != 1:
              raise SystemExit('usage alias enforce anchor mismatch')
          text = text.replace(old, new)

          runtime.write_text(text, encoding='utf-8', newline='\n')

          tests = Path('tests/test_bench2_hermes_canary.py')
          test_text = tests.read_text(encoding='utf-8')
          old_call = '''                    hermes_repo=base / "repo",\n                )\n'''
          new_call = '''                    hermes_repo=base / "repo",\n                    runtime_model="bench2-canary:test",\n                )\n'''
          if test_text.count(old_call) != 1:
              raise SystemExit('environment test call anchor mismatch')
          test_text = test_text.replace(old_call, new_call)
          old_assert = '''        self.assertEqual(env["OPENAI_API_KEY"], "local-only-not-secret")\n'''
          new_assert = '''        self.assertEqual(env["OPENAI_API_KEY"], "local-only-not-secret")\n        self.assertEqual(env["HERMES_INFERENCE_MODEL"], "bench2-canary:test")\n'''
          if test_text.count(old_assert) != 1:
              raise SystemExit('environment test assertion anchor mismatch')
          test_text = test_text.replace(old_assert, new_assert)
          insertion_anchor = '''    def test_plan_is_single_candidate_single_case_with_explicit_marker_state(self):\n'''
          added_test = '''    def test_temporary_runtime_alias_is_bound_to_source_and_64k_modelfile(self):\n        self.assertEqual(\n            runtime._runtime_modelfile("source:model"),\n            "FROM source:model\\nPARAMETER num_ctx 65536\\n",\n        )\n        with mock.patch.dict(\n            os.environ,\n            {"GITHUB_RUN_ID": "12345", "GITHUB_RUN_ATTEMPT": "2"},\n            clear=False,\n        ):\n            self.assertEqual(\n                runtime._runtime_alias_name(),\n                "bench2-canary-qwythos-safe-64k:12345-2",\n            )\n        source = (validator.ROOT / "scripts/run_bench2_hermes_canary.py").read_text(encoding="utf-8")\n        self.assertIn('["ollama", "create", alias, "-f", str(modelfile)]', source)\n        self.assertIn('["ollama", "rm", model_name]', source)\n\n'''
          if test_text.count(insertion_anchor) != 1:
              raise SystemExit('alias test insertion anchor mismatch')
          test_text = test_text.replace(insertion_anchor, added_test + insertion_anchor)
          digest = hashlib.sha256(runtime.read_bytes()).hexdigest()
          test_text, count = re.subn(
              r'(?<=digest,\n            ")[0-9a-f]{64}(?=",\n        \))',
              digest,
              test_text,
              count=1,
          )
          if count != 1:
              raise SystemExit('runtime byte hash replacement mismatch')
          tests.write_text(test_text, encoding='utf-8', newline='\n')

          marker = Path('config/bench2-hermes-canary-oneshot.json')
          marker_text = marker.read_text(encoding='utf-8')
          if marker_text.count('  "enabled": true,') != 1:
              raise SystemExit('marker reset count mismatch')
          marker.write_text(
              marker_text.replace('  "enabled": true,', '  "enabled": false,'),
              encoding='utf-8',
              newline='\n',
          )
          PY
          python -m py_compile scripts/run_bench2_hermes_canary.py tests/test_bench2_hermes_canary.py
          python -m unittest tests.test_bench2_hermes_plan tests.test_bench2_hermes_canary
          python scripts/validate_bench2_hermes_canary.py
          git rm .github/workflows/apply-derived-alias-fix.yml
      - name: Commit reviewed derived-alias fix
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/run_bench2_hermes_canary.py tests/test_bench2_hermes_canary.py config/bench2-hermes-canary-oneshot.json
          git commit -m "Use temporary 64K Ollama alias for canary"
          git push origin HEAD:fix/bench2-canary-derived-64k-alias
