name: Apply full-matrix review fixes

on:
  push:
    branches:
      - bench/implement-hermes-full-matrix-runtime
    paths:
      - .github/workflows/apply-full-matrix-review-fixes.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bench/implement-hermes-full-matrix-runtime
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply reviewed fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib

          root = Path('.')
          runner_path = root / 'scripts/run_bench2_hermes_batch.py'
          test_path = root / 'tests/test_bench2_hermes_execution.py'
          validator_path = root / 'scripts/validate_bench2_hermes_execution.py'
          workflow_path = root / '.github/workflows/bench2-hermes-full-matrix-oneshot.yml'

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              return text.replace(old, new, 1)

          text = runner_path.read_text(encoding='utf-8')

          text = replace_once(
              text,
              '    usage_checks: list[dict[str, Any]],\n    runtime_model: dict[str, Any] | None,',
              '    usage_checks: list[dict[str, Any]],\n    usage: dict[str, Any] | None,\n    runtime_model: dict[str, Any] | None,',
              'semantic validator usage parameter',
          )

          text = replace_once(
              text,
              '    add(\n        "output_actions_exact",\n        output is not None and output.get("actions") == expected["actions"],\n        f"observed={output.get(\'actions\') if output else None!r}",\n    )\n    add("tool_trace_valid", trace_error is None, f"error={trace_error!r}")',
              '    add(\n        "output_actions_exact",\n        output is not None and output.get("actions") == expected["actions"],\n        f"observed={output.get(\'actions\') if output else None!r}",\n    )\n    limits = case.get("limits") if isinstance(case.get("limits"), dict) else {}\n    max_model_calls = limits.get("max_model_calls")\n    api_calls = usage.get("api_calls") if isinstance(usage, dict) else None\n    add(\n        "model_call_budget_within_limit",\n        isinstance(max_model_calls, int)\n        and not isinstance(max_model_calls, bool)\n        and isinstance(api_calls, int)\n        and not isinstance(api_calls, bool)\n        and 1 <= api_calls <= max_model_calls,\n        f"api_calls={api_calls!r} max_model_calls={max_model_calls!r}",\n    )\n    add("tool_trace_valid", trace_error is None, f"error={trace_error!r}")',
              'case-specific model-call budget',
          )

          text = replace_once(
              text,
              '        "output_actions_exact",\n        "tool_trace_exact",',
              '        "output_actions_exact",\n        "model_call_budget_within_limit",\n        "tool_trace_exact",',
              'semantic budget check membership',
          )

          text = replace_once(
              text,
              '            usage_checks=usage_checks,\n            runtime_model=runtime_model,',
              '            usage_checks=usage_checks,\n            usage=usage,\n            runtime_model=runtime_model,',
              'semantic validator usage call',
          )

          text = replace_once(
              text,
              '        for candidate in selected:\n            installed = _installed_candidate(candidate)\n            alias: dict[str, Any] | None = None',
              '        for candidate in selected:\n            expected_alias_name = _alias_name(batch_index, int(candidate["sequence"]))\n            installed: dict[str, Any] | None = None\n            alias: dict[str, Any] | None = None',
              'candidate setup isolation',
          )

          text = replace_once(
              text,
              '            try:\n                alias = _create_alias(',
              '            try:\n                installed = _installed_candidate(candidate)\n                alias = _create_alias(',
              'candidate inventory inside try',
          )

          text = replace_once(
              text,
              '                alias["installed_source_size"] = installed.get("size")',
              '                alias["installed_source_size"] = installed.get("size") if installed else None',
              'installed source size guard',
          )

          text = replace_once(
              text,
              '                    canary.stop_all_running_models()\n                    if alias is not None:\n                        alias_cleanup = {\n                            "attempted": True,\n                            **canary._remove_model_if_present(alias["name"]),\n                        }\n                        if alias_cleanup.get("verified_absent") is not True:\n                            raise HermesBatchError(\n                                f"alias cleanup failed for {candidate[\'candidate_id\']}"\n                            )',
              '                    canary.stop_all_running_models()\n                    alias_cleanup = {\n                        "attempted": True,\n                        **canary._remove_model_if_present(expected_alias_name),\n                    }\n                    if alias_cleanup.get("verified_absent") is not True:\n                        raise HermesBatchError(\n                            f"alias cleanup failed for {candidate[\'candidate_id\']}"\n                        )',
              'alias cleanup regardless of setup stage',
          )

          text = replace_once(
              text,
              '                    result["infrastructure_error"] = {\n                        "type": "HermesBatchError",\n                        "detail": detail,\n                    }\n                    run_dir = output_dir / result["artifact_path"]\n                    validator_path = run_dir / "validator-result.json"\n                    if validator_path.is_file():\n                        validator = _load_json(validator_path)\n                        validator["infrastructure_valid"] = False\n                        validator["passed"] = False\n                        _write_json(validator_path, validator)\n                        _write_run_manifest(run_dir)',
              '                    error_record = {\n                        "type": "HermesBatchError",\n                        "detail": detail,\n                    }\n                    result["infrastructure_error"] = error_record\n                    result["cleanup_verified"] = False\n                    run_dir = output_dir / result["artifact_path"]\n                    validator_path = run_dir / "validator-result.json"\n                    if validator_path.is_file():\n                        validator = _load_json(validator_path)\n                        validator["infrastructure_valid"] = False\n                        validator["semantic_pass"] = False\n                        validator["passed"] = False\n                        _write_json(validator_path, validator)\n                    environment_path = run_dir / "environment-fingerprint.json"\n                    if environment_path.is_file():\n                        environment = _load_json(environment_path)\n                        environment["infrastructure_error"] = error_record\n                        environment["candidate_alias_cleanup"] = alias_cleanup\n                        _write_json(environment_path, environment)\n                    _write_run_manifest(run_dir)',
              'propagate candidate infrastructure invalidation',
          )

          text = replace_once(
              text,
              '            aliases.append({\n                "candidate_id": candidate["candidate_id"],',
              '            aliases.append({\n                "candidate_id": candidate["candidate_id"],\n                "expected_alias_name": expected_alias_name,',
              'alias expected name evidence',
          )

          helper = r'''

def _verify_run_manifest(run_dir: Path) -> None:
    manifest = _load_json(run_dir / "manifest.json")
    if manifest.get("schema_version") != canary.MANIFEST_SCHEMA:
        raise HermesBatchError(f"run manifest schema is invalid: {run_dir}")
    artifacts = manifest.get("artifacts")
    if not isinstance(artifacts, dict) or not artifacts:
        raise HermesBatchError(f"run manifest inventory is missing: {run_dir}")
    observed = {
        path.relative_to(run_dir).as_posix()
        for path in run_dir.rglob("*")
        if path.is_file() and path != run_dir / "manifest.json"
    }
    if set(artifacts) != observed:
        raise HermesBatchError(f"run manifest file set drifted: {run_dir}")
    for name, record in artifacts.items():
        path = run_dir / name
        if not isinstance(record, dict):
            raise HermesBatchError(f"run manifest record invalid: {run_dir}/{name}")
        if record.get("sha256") != _sha256(path):
            raise HermesBatchError(f"run artifact digest mismatch: {run_dir}/{name}")
        if record.get("size_bytes") != path.stat().st_size:
            raise HermesBatchError(f"run artifact size mismatch: {run_dir}/{name}")


def _verify_result_artifacts(
    output_dir: Path,
    result: dict[str, Any],
    candidate: dict[str, Any],
    case: dict[str, Any],
) -> None:
    repetition = result.get("repetition")
    expected_relative = (
        Path("runs") / candidate["candidate_id"] / case["case_id"] / f"r{repetition}"
    ).as_posix()
    if result.get("artifact_path") != expected_relative:
        raise HermesBatchError("run artifact path binding drifted")
    run_dir = output_dir / expected_relative
    _verify_run_manifest(run_dir)
    validator = _load_json(run_dir / "validator-result.json")
    environment = _load_json(run_dir / "environment-fingerprint.json")
    usage = _load_json(run_dir / "usage.json")
    if validator.get("schema_version") != VALIDATOR_SCHEMA:
        raise HermesBatchError("run validator schema drifted")
    if validator.get("case_id") != case["case_id"] or validator.get("capability") != case["capability"]:
        raise HermesBatchError("run validator case binding drifted")
    if environment.get("candidate", {}).get("candidate_id") != candidate["candidate_id"]:
        raise HermesBatchError("run environment candidate binding drifted")
    if environment.get("candidate", {}).get("digest") != candidate["digest"]:
        raise HermesBatchError("run environment candidate digest drifted")
    infrastructure_valid = result.get("infrastructure_valid") is True
    semantic_pass = result.get("semantic_pass") is True
    expected_status = (
        "passed" if infrastructure_valid and semantic_pass
        else "failed" if infrastructure_valid
        else "invalid_infrastructure"
    )
    if result.get("candidate_result_status") != expected_status:
        raise HermesBatchError("run result status is inconsistent")
    if validator.get("infrastructure_valid") is not infrastructure_valid:
        raise HermesBatchError("run infrastructure classification drifted")
    if validator.get("semantic_pass") is not semantic_pass:
        raise HermesBatchError("run semantic classification drifted")
    if validator.get("passed") is not (infrastructure_valid and semantic_pass):
        raise HermesBatchError("run pass classification drifted")
    alias = result.get("runtime_alias")
    if infrastructure_valid:
        if not isinstance(alias, dict):
            raise HermesBatchError("valid run alias evidence is missing")
        runtime_model = environment.get("runtime_model")
        if not isinstance(runtime_model, dict):
            raise HermesBatchError("valid run runtime model evidence is missing")
        if runtime_model.get("name") != alias.get("name") or runtime_model.get("digest") != alias.get("digest"):
            raise HermesBatchError("valid run runtime alias identity drifted")
        if runtime_model.get("context_length") != 65536:
            raise HermesBatchError("valid run context is not 65536")
        if environment.get("residency_class") != "full_vram":
            raise HermesBatchError("valid run is not fully resident in VRAM")
        if environment.get("infrastructure_error") is not None:
            raise HermesBatchError("valid run carries an infrastructure error")
        if usage.get("provider") != "custom" or usage.get("model") != alias.get("name"):
            raise HermesBatchError("valid run usage binding drifted")
        if result.get("cleanup_verified") is not True:
            raise HermesBatchError("valid run cleanup is not verified")
    else:
        if not isinstance(result.get("infrastructure_error"), dict):
            raise HermesBatchError("invalid run infrastructure error is missing")
        if not isinstance(environment.get("infrastructure_error"), dict):
            raise HermesBatchError("invalid run environment error is missing")
'''
          text = replace_once(
              text,
              '\ndef enforce(output_dir: Path = DEFAULT_ARTIFACTS) -> int:\n',
              helper + '\n\ndef enforce(output_dir: Path = DEFAULT_ARTIFACTS) -> int:\n',
              'run evidence helpers',
          )

          text = replace_once(
              text,
              '        if report.get("schema_version") != REPORT_SCHEMA:\n            raise HermesBatchError("batch report schema is invalid")\n        if report.get("repository") != repository:',
              '        if report.get("schema_version") != REPORT_SCHEMA:\n            raise HermesBatchError("batch report schema is invalid")\n        expected_source = {\n            "plan_sha256": execution.plan_validator.EXPECTED_PLAN_SHA256,\n            "canary_closeout_sha256": execution.EXPECTED_CLOSEOUT_SHA256,\n            "candidate_registry_sha256": execution.plan_validator.EXPECTED_REGISTRY_SHA256,\n            "h4_summary_sha256": execution.plan_validator.EXPECTED_H4_SUMMARY_SHA256,\n            "hermes_commit_sha": execution.plan_validator.EXPECTED_HERMES_COMMIT,\n            "hermes_version": execution.plan_validator.EXPECTED_HERMES_VERSION,\n        }\n        if report.get("source") != expected_source:\n            raise HermesBatchError("batch source binding drifted")\n        expected_workflow = {\n            "run_id": os.environ.get("GITHUB_RUN_ID"),\n            "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT"),\n            "sha": os.environ.get("GITHUB_SHA"),\n            "ref": os.environ.get("GITHUB_REF"),\n        }\n        if report.get("workflow") != expected_workflow:\n            raise HermesBatchError("batch workflow binding drifted")\n        if report.get("repository") != repository:',
              'batch source and workflow binding',
          )

          text = replace_once(
              text,
              '        if observed_keys != expected_keys:\n            raise HermesBatchError("batch candidate/case/repetition coverage drifted")\n        allowed_statuses = {"passed", "failed", "invalid_infrastructure"}',
              '        if observed_keys != expected_keys:\n            raise HermesBatchError("batch candidate/case/repetition coverage drifted")\n        candidate_by_id = {item["candidate_id"]: item for item in selected}\n        case_by_id = {item["case_id"]: item for item in cases}\n        for item in results:\n            if not isinstance(item, dict):\n                raise HermesBatchError("batch result record is not an object")\n            candidate = candidate_by_id.get(item.get("candidate_id"))\n            case = case_by_id.get(item.get("case_id"))\n            if candidate is None or case is None:\n                raise HermesBatchError("batch result inventory contains an unknown binding")\n            _verify_result_artifacts(output_dir, item, candidate, case)\n        allowed_statuses = {"passed", "failed", "invalid_infrastructure"}',
              'per-run evidence verification',
          )

          text = replace_once(
              text,
              '        if not isinstance(aliases, list) or len(aliases) != 2:\n            raise HermesBatchError("batch alias evidence is incomplete")\n        if any(item.get("cleanup", {}).get("verified_absent") is not True for item in aliases):\n            raise HermesBatchError("batch alias cleanup is invalid")',
              '        if not isinstance(aliases, list) or len(aliases) != 2:\n            raise HermesBatchError("batch alias evidence is incomplete")\n        alias_by_candidate = {item.get("candidate_id"): item for item in aliases if isinstance(item, dict)}\n        if set(alias_by_candidate) != set(candidate_by_id):\n            raise HermesBatchError("batch alias candidate inventory drifted")\n        for candidate_id, candidate in candidate_by_id.items():\n            item = alias_by_candidate[candidate_id]\n            expected_alias = _alias_name(batch_index, int(candidate["sequence"]))\n            if item.get("expected_alias_name") != expected_alias:\n                raise HermesBatchError("batch expected alias name drifted")\n            if item.get("cleanup", {}).get("verified_absent") is not True:\n                raise HermesBatchError("batch alias cleanup is invalid")\n            runtime_alias = item.get("runtime_alias")\n            if runtime_alias is not None:\n                if runtime_alias.get("name") != expected_alias:\n                    raise HermesBatchError("batch runtime alias name drifted")\n                if runtime_alias.get("source_candidate_id") != candidate_id:\n                    raise HermesBatchError("batch runtime alias source id drifted")\n                if runtime_alias.get("source_candidate_digest") != candidate["digest"]:\n                    raise HermesBatchError("batch runtime alias source digest drifted")',
              'strong alias evidence verification',
          )

          runner_path.write_text(text, encoding='utf-8', newline='\n')

          tests = test_path.read_text(encoding='utf-8')
          tests = replace_once(tests, 'import json\n', 'import hashlib\nimport json\n', 'hashlib import')
          tests = tests.replace(
              '            "expected": {\n                "actions": ["call_tool", "return_final", "stop"],\n                "final": "BRAVO-19",\n            },\n        }',
              '            "expected": {\n                "actions": ["call_tool", "return_final", "stop"],\n                "final": "BRAVO-19",\n            },\n            "limits": {"max_model_calls": 2},\n        }',
              1,
          )
          tests = tests.replace(
              '            usage_checks=usage_checks,\n            runtime_model={"context_length": 65536},',
              '            usage_checks=usage_checks,\n            usage={"api_calls": 1},\n            runtime_model={"context_length": 65536},',
              1,
          )
          tests = tests.replace(
              '            "expected": {\n                "actions": ["return_supplied_result", "stop"],\n                "final": "stable-result",\n            },\n        }',
              '            "expected": {\n                "actions": ["return_supplied_result", "stop"],\n                "final": "stable-result",\n            },\n            "limits": {"max_model_calls": 1},\n        }',
              1,
          )
          tests = tests.replace(
              '            usage_checks=usage_checks,\n            runtime_model={"context_length": 65536},',
              '            usage_checks=usage_checks,\n            usage={"api_calls": 1},\n            runtime_model={"context_length": 65536},',
              1,
          )

          extra_tests = r'''

    def test_stop_case_rejects_two_model_calls_as_semantic_failure(self):
        usage_checks = [
            {"check": name, "passed": True, "detail": ""}
            for name in (
                "usage_provider_custom", "usage_model_exact", "usage_completed",
                "usage_not_failed", "usage_api_calls_bounded",
                "usage_input_tokens_nonnegative", "usage_output_tokens_nonnegative",
                "usage_total_tokens_nonnegative",
            )
        ]
        case = {
            "case_id": "ho-stop-hermes-reuse-001",
            "capability": "HO-STOP",
            "expected": {
                "actions": ["return_supplied_result", "stop"],
                "final": "stable-result",
            },
            "limits": {"max_model_calls": 1},
        }
        result = runner._semantic_validator(
            case=case,
            process={"returncode": 0, "timed_out": False},
            output={"actions": ["return_supplied_result", "stop"], "final": "stable-result"},
            output_error=None,
            tool_records=[],
            trace_error=None,
            usage_checks=usage_checks,
            usage={"api_calls": 2},
            runtime_model={"context_length": 65536},
            residency_class="full_vram",
            residency_ratio=1.0,
            stderr_text="Plugin bench2-fixture registered tool: bench_lookup",
        )
        self.assertTrue(result["infrastructure_valid"])
        self.assertFalse(result["semantic_pass"])

    def test_candidate_setup_and_alias_cleanup_are_failure_isolated(self):
        source = execution.RUNNER_PATH.read_text(encoding="utf-8")
        self.assertIn("installed = _installed_candidate(candidate)", source)
        self.assertIn("_remove_model_if_present(expected_alias_name)", source)
        self.assertNotIn("for candidate in selected:\n            installed = _installed_candidate(candidate)", source)

    def test_full_matrix_reviewed_sources_match_hashes(self):
        expected = {
            "scripts/run_bench2_hermes_batch.py": "__RUNNER_HASH__",
            "scripts/validate_bench2_hermes_execution.py": "__VALIDATOR_HASH__",
            ".github/workflows/bench2-hermes-full-matrix-oneshot.yml": "__WORKFLOW_HASH__",
        }
        for relative, digest in expected.items():
            observed = hashlib.sha256((execution.ROOT / relative).read_bytes()).hexdigest()
            self.assertEqual(observed, digest, relative)
'''
          tests = replace_once(
              tests,
              '\n\nif __name__ == "__main__":\n',
              extra_tests + '\n\nif __name__ == "__main__":\n',
              'additional review tests',
          )

          hashes = {
              '__RUNNER_HASH__': hashlib.sha256(runner_path.read_bytes()).hexdigest(),
              '__VALIDATOR_HASH__': hashlib.sha256(validator_path.read_bytes()).hexdigest(),
              '__WORKFLOW_HASH__': hashlib.sha256(workflow_path.read_bytes()).hexdigest(),
          }
          for placeholder, digest in hashes.items():
              tests = tests.replace(placeholder, digest)
          test_path.write_text(tests, encoding='utf-8', newline='\n')
          PY
          python -m unittest tests.test_bench2_hermes_execution
          python -m py_compile scripts/run_bench2_hermes_batch.py scripts/validate_bench2_hermes_execution.py
          rm .github/workflows/apply-full-matrix-review-fixes.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/run_bench2_hermes_batch.py tests/test_bench2_hermes_execution.py .github/workflows/apply-full-matrix-review-fixes.yml
          git commit -m "Harden Hermes full-matrix evidence runtime"
          git push origin HEAD:bench/implement-hermes-full-matrix-runtime
