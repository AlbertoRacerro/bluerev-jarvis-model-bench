name: BENCH-1 route contract validation

on:
  push:
    branches: [fix/bench1-route-response-contract]

permissions:
  contents: read
  statuses: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          clean: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile changed contract files
        id: compile
        run: |
          python -m py_compile \
            src/bench/direct_execution_v3.py \
            tests/test_direct_execution_v3.py
      - name: Run focused deterministic tests
        id: tests
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          python -m unittest -v \
            tests.test_direct_execution_v3 \
            tests.test_evaluator \
            tests.test_cases
      - name: Publish commit status
        if: always()
        uses: actions/github-script@v7
        env:
          COMPILE: ${{ steps.compile.outcome }}
          TESTS: ${{ steps.tests.outcome }}
        with:
          script: |
            const success = process.env.COMPILE === 'success' && process.env.TESTS === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: success ? 'success' : 'failure',
              context: 'bench1-route-contract',
              description: success ? 'HO-ROUTE contract tests passed' : 'HO-ROUTE contract validation failed',
            });
