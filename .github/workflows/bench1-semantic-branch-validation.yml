name: BENCH-1 semantic branch validation

on:
  push:
    branches: [bench/bench1-direct-semantic-campaign]

permissions:
  contents: read
  statuses: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          clean: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile semantic campaign blobs
        id: compile
        run: |
          python -m py_compile \
            scripts/probe_direct_semantic_campaign.py \
            scripts/run_direct_semantic_campaign_job.py \
            scripts/run_direct_semantic_campaign_bound_job.py \
            tests/test_direct_semantic_campaign.py
      - name: Run deterministic semantic campaign tests
        id: tests
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          python -m unittest -v \
            tests.test_direct_semantic_campaign \
            tests.test_direct_execution_v3 \
            tests.test_evaluator \
            tests.test_cases \
            tests.test_contracts
      - name: Publish validation status
        if: always()
        uses: actions/github-script@v7
        env:
          COMPILE: ${{ steps.compile.outcome }}
          TESTS: ${{ steps.tests.outcome }}
        with:
          script: |
            const success = process.env.COMPILE === 'success' && process.env.TESTS === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: success ? 'success' : 'failure',
              context: 'bench1-semantic-campaign',
              description: success ? 'Semantic campaign compile and tests passed' : 'Semantic campaign validation failed',
            });
