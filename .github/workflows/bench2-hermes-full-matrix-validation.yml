name: BENCH-2 Hermes full-matrix validation

on:
  pull_request:
    paths:
      - candidates/bench2-h4-eligible.json
      - config/bench2-hermes-orchestrator-oneshot.json
      - fixtures/bench-2/**
      - fixtures/bench-plans/hermes-orchestrator-h4-eligible-plan-v2.json
      - reports/H4-HERMES-MINIMUM-64K/**
      - reports/BENCH-2-HERMES-CANARY/**
      - scripts/run_bench2_hermes_batch.py
      - scripts/validate_bench2_hermes_execution.py
      - scripts/validate_bench2_hermes_plan.py
      - scripts/validate_bench2_hermes_canary_closeout.py
      - tests/test_bench2_hermes_execution.py
      - tests/test_bench2_hermes_plan.py
      - tests/test_bench2_hermes_canary_closeout.py
      - .github/workflows/bench2-hermes-full-matrix-validation.yml
      - .github/workflows/bench2-hermes-full-matrix-oneshot.yml
      - .gitattributes
      - STATUS.md

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate full-matrix runtime contract
        id: validate
        shell: bash
        run: |
          mkdir -p artifacts
          set +e
          status=0
          {
            echo '=== UNIT TESTS ==='
            python -m unittest -v tests.test_bench2_hermes_plan tests.test_bench2_hermes_canary_closeout tests.test_bench2_hermes_execution
            code=$?
            echo "unit_tests_exit=$code"
            if [ "$code" -ne 0 ] && [ "$status" -eq 0 ]; then status=$code; fi

            echo '=== PLAN VALIDATOR ==='
            python scripts/validate_bench2_hermes_plan.py --output artifacts/bench2-plan-validation.json
            code=$?
            echo "plan_exit=$code"
            if [ "$code" -ne 0 ] && [ "$status" -eq 0 ]; then status=$code; fi

            echo '=== CANARY CLOSEOUT VALIDATOR ==='
            python scripts/validate_bench2_hermes_canary_closeout.py --output artifacts/bench2-canary-closeout-validation.json
            code=$?
            echo "canary_closeout_exit=$code"
            if [ "$code" -ne 0 ] && [ "$status" -eq 0 ]; then status=$code; fi

            echo '=== EXECUTION VALIDATOR ==='
            python scripts/validate_bench2_hermes_execution.py --output artifacts/bench2-full-matrix-validation.json
            code=$?
            echo "execution_exit=$code"
            if [ "$code" -ne 0 ] && [ "$status" -eq 0 ]; then status=$code; fi

            echo '=== PYTHON COMPILE ==='
            python -m py_compile scripts/run_bench2_hermes_batch.py
            code=$?
            echo "compile_exit=$code"
            if [ "$code" -ne 0 ] && [ "$status" -eq 0 ]; then status=$code; fi
          } > artifacts/full-matrix-validation.log 2>&1
          cat artifacts/full-matrix-validation.log
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench2-hermes-full-matrix-validation
          path: artifacts/
          if-no-files-found: error
          retention-days: 14
      - name: Enforce validation result
        if: always()
        shell: bash
        run: test "${{ steps.validate.outputs.exit_code }}" = "0"
