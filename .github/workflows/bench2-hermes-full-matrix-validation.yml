name: BENCH-2 Hermes full-matrix validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-verify:
    if: github.head_ref == 'fix/bench2-run-output-dir-and-invalid-closeout' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/bench2-run-output-dir-and-invalid-closeout
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply reviewed fix and freeze invalid run
        shell: bash
        run: |
          git fetch origin main --depth=1
          python - <<'PY'
          from pathlib import Path
          import hashlib
          import json
          import re

          runner_path = Path('scripts/run_bench2_hermes_batch.py')
          test_path = Path('tests/test_bench2_hermes_execution.py')
          marker_path = Path('config/bench2-hermes-orchestrator-oneshot.json')
          attributes_path = Path('.gitattributes')
          status_path = Path('STATUS.md')

          runner = runner_path.read_text(encoding='utf-8')
          start = runner.index('def _run_once(')
          runtime_line = '    runtime_base = Path(os.environ.get("RUNNER_TEMP") or tempfile.gettempdir())'
          insert_at = runner.index(runtime_line, start)
          mkdir_line = '    output_dir.mkdir(parents=True, exist_ok=True)\n'
          function_prefix = runner[start:insert_at]
          if 'output_dir.mkdir(parents=True, exist_ok=True)' not in function_prefix:
              runner = runner[:insert_at] + mkdir_line + runner[insert_at:]
          runner_path.write_text(runner, encoding='utf-8', newline='\n')

          tests = test_path.read_text(encoding='utf-8')
          test_name = 'test_run_once_creates_output_dir_before_artifact_writes'
          if test_name not in tests:
              anchor = '    def test_candidate_setup_and_alias_cleanup_are_failure_isolated(self):\n'
              block = '''    def test_run_once_creates_output_dir_before_artifact_writes(self):
              source = execution.RUNNER_PATH.read_text(encoding="utf-8")
              start = source.index("def _run_once(")
              end = source.index("\\ndef ", start + 1)
              body = source[start:end]
              mkdir_index = body.index("output_dir.mkdir(parents=True, exist_ok=True)")
              first_write_index = body.index('(output_dir / "raw-output.txt").write_text')
              self.assertLess(mkdir_index, first_write_index)

'''
              if tests.count(anchor) != 1:
                  raise SystemExit('test insertion anchor mismatch')
              tests = tests.replace(anchor, block + anchor, 1)
          digest = hashlib.sha256(runner_path.read_bytes()).hexdigest()
          tests, count = re.subn(
              r'("scripts/run_bench2_hermes_batch\.py": ")[0-9a-f]{64}("[,])',
              rf'\g<1>{digest}\g<2>',
              tests,
              count=1,
          )
          if count != 1:
              raise SystemExit('runner reviewed hash replacement failed')
          test_path.write_text(tests, encoding='utf-8', newline='\n')

          marker = json.loads(marker_path.read_text(encoding='utf-8'))
          marker['enabled'] = False
          marker_path.write_text(json.dumps(marker, indent=2, sort_keys=True) + '\n', encoding='utf-8', newline='\n')

          report_dir = Path('reports/BENCH-2-HERMES-FULL-MATRIX-INVALID-29269445368')
          report_dir.mkdir(parents=True, exist_ok=True)
          summary = {
              'schema_version': 'bench.hermes-full-matrix-invalid-closeout.v1',
              'run': {
                  'workflow_run_id': 29269445368,
                  'workflow_run_attempt': 1,
                  'activation_commit_sha': '554ea07482fe3755ee2fb5219d7e91040a9a65c0',
                  'workflow': 'BENCH-2 Hermes full matrix',
                  'event': 'push',
                  'ref': 'refs/heads/main',
              },
              'bindings': {
                  'plan_sha256': '0ac1832f959ff3780ecd36f44bc5d24ba49594529974b863a2aebcadeb55d312',
                  'candidate_registry_sha256': '67a311b7e4e75135dae6e1c2ce3dd25767b4d41f8439ec6bee7701d0c90881d7',
                  'h4_summary_sha256': 'fc81c95c51ea55e9b79e293feee5fb9762655ccb1d2831b31ac4257fa5968af5',
                  'canary_closeout_sha256': '010791bdea707e809dc52d2919b6d68b7ea50df086bf1187b8cd46039f590ba9',
                  'hermes_version': '0.18.2',
                  'hermes_commit_sha': '73b611ad19720d70308dad6b0fb64648aaadc216',
              },
              'inventory': {
                  'candidate_count': 8,
                  'case_count': 2,
                  'repetitions_per_pair': 3,
                  'expected_runs': 48,
                  'captured_runs': 48,
                  'candidates': [
                      'gemma4-12b-it-qat', 'qwable-9b-fable5', 'qwythos-mythos-9b',
                      'minicpm5-fable-1b-control', 'gemma4-fable-agentic-12b',
                      'gemma4-fable-coder-12b', 'qwythos-hermes-64k', 'qwythos-hermes-safe',
                  ],
                  'cases': ['ho-tools-hermes-lookup-001', 'ho-stop-hermes-reuse-001'],
              },
              'observed_counts': {
                  'passed': 0,
                  'failed': 0,
                  'invalid_infrastructure': 48,
                  'semantically_evaluable': 0,
              },
              'root_cause': {
                  'classification': 'common_runner_bug',
                  'error_type': 'FileNotFoundError',
                  'source_path': 'scripts/run_bench2_hermes_batch.py',
                  'function': '_run_once',
                  'missing_operation': 'output_dir.mkdir(parents=True, exist_ok=True)',
                  'first_failed_write': 'raw-output.txt',
                  'detail': 'The per-run output directory was not created before the runner attempted to persist Hermes stdout. The exception occurred before any Hermes/model inference evidence was recorded.',
              },
              'integrity': {
                  'all_four_artifacts_present': True,
                  'all_archive_sha256_match_github': True,
                  'all_internal_manifests_verified': True,
                  'all_reports_bound_to_activation_sha': True,
                  'all_reports_bound_to_plan': True,
                  'all_eight_candidates_attempted': True,
                  'all_temporary_aliases_exposed_num_ctx_65536': True,
                  'all_temporary_aliases_removed': True,
                  'model_inference_observed': False,
                  'semantic_results_valid': False,
                  'external_provider_use_observed': False,
                  'jarvisos_access_observed': False,
              },
              'artifacts': [
                  {'batch_index': 0, 'artifact_id': 8290930084, 'artifact_name': 'bench2-hermes-29269445368-1-b0', 'archive_sha256': 'd54ea8f6efb3e444598db055f22914bdf3d9b0a5df720b02e325580e8f8dff28', 'archive_size_bytes': 51755},
                  {'batch_index': 1, 'artifact_id': 8291016865, 'artifact_name': 'bench2-hermes-29269445368-1-b1', 'archive_sha256': 'dfd5d6fad0acabaacd0fb6c9f5c5ff2a6853454db642acf349e2efe30409c780', 'archive_size_bytes': 53306},
                  {'batch_index': 2, 'artifact_id': 8291090447, 'artifact_name': 'bench2-hermes-29269445368-1-b2', 'archive_sha256': '43cc2a48ee085646d276da6ab6561d0d548c8306cf8d9aa75d9534c4c05b28e5', 'archive_size_bytes': 53739},
                  {'batch_index': 3, 'artifact_id': 8291132347, 'artifact_name': 'bench2-hermes-29269445368-1-b3', 'archive_sha256': '5c2cd045b8aab4eb5a6e17af252bd351cb10b6afccdcc48535122d2c15d52356', 'archive_size_bytes': 52423},
              ],
              'decision': {
                  'run_status': 'invalid_infrastructure',
                  'use_for_model_comparison': False,
                  'use_for_semantic_scoring': False,
                  'candidate_failures_attributable': False,
                  'rerun_required': True,
                  'marker_must_be_disabled_before_fix_merge': True,
              },
          }
          summary_json = json.dumps(summary, indent=2, sort_keys=True) + '\n'
          summary_md = '''# BENCH-2 Hermes full matrix — invalid infrastructure closeout

Run `29269445368` attempted the complete reviewed matrix: eight H4-qualified Lane 1 candidates, two cases, and three repetitions per pair.

## Decision

The entire run is invalid infrastructure evidence. It must not be used for semantic scoring, capability ranking, or candidate exclusion.

All 48 run records failed before model inference because `_run_once` attempted to write `raw-output.txt` before creating the per-run output directory. The common missing operation is:

```python
output_dir.mkdir(parents=True, exist_ok=True)
```

## Verified evidence

- All four GitHub artifact archives were downloaded and their SHA-256 digests matched GitHub.
- All top-level and per-run internal manifests matched their files byte-for-byte.
- Every report is bound to activation commit `554ea07482fe3755ee2fb5219d7e91040a9a65c0`, run `29269445368`, attempt `1`, and the reviewed BENCH-2 plan.
- All eight candidate aliases were created with `num_ctx 65536` and subsequently removed.
- No run produced valid model-inference or semantic evidence.

## Next action

Disable the one-shot marker, create the output directory before the first artifact write, add a deterministic regression test, validate on GitHub-hosted runners, and then launch a fresh one-shot run. Do not rerun the failed jobs against the old activation commit.
'''
          (report_dir / 'summary.json').write_text(summary_json, encoding='utf-8', newline='\n')
          (report_dir / 'summary.md').write_text(summary_md, encoding='utf-8', newline='\n')
          manifest = {
              'schema_version': 'bench.hermes-full-matrix-invalid-closeout-manifest.v1',
              'artifacts': {},
          }
          for name in ('summary.json', 'summary.md'):
              path = report_dir / name
              manifest['artifacts'][name] = {
                  'sha256': hashlib.sha256(path.read_bytes()).hexdigest(),
                  'size_bytes': path.stat().st_size,
              }
          (report_dir / 'manifest.json').write_text(
              json.dumps(manifest, indent=2, sort_keys=True) + '\n',
              encoding='utf-8', newline='\n'
          )

          attributes = attributes_path.read_text(encoding='utf-8')
          for line in (
              'reports/BENCH-2-HERMES-FULL-MATRIX-INVALID-29269445368/*.json text eol=lf',
              'reports/BENCH-2-HERMES-FULL-MATRIX-INVALID-29269445368/*.md text eol=lf',
          ):
              if line not in attributes.splitlines():
                  attributes += ('\n' if attributes and not attributes.endswith('\n') else '') + line + '\n'
          attributes_path.write_text(attributes, encoding='utf-8', newline='\n')

          status = status_path.read_text(encoding='utf-8')
          section = '''

## BENCH-2 Hermes full matrix — run 29269445368 invalid

- Activation SHA: `554ea07482fe3755ee2fb5219d7e91040a9a65c0`.
- All four batches captured artifacts, but all 48 records are `invalid_infrastructure` from the same runner bug: the per-run output directory was not created before writing `raw-output.txt`.
- No semantic result or candidate failure is attributable from this run.
- Artifact archive digests and all internal manifests were independently verified; all temporary 64K aliases were removed.
- The execution marker is disabled. A fresh activation is required after the output-directory regression fix passes hosted validation.
'''
          if '## BENCH-2 Hermes full matrix — run 29269445368 invalid' not in status:
              status += section
          status_path.write_text(status, encoding='utf-8', newline='\n')
          PY
          git show origin/main:.github/workflows/bench2-hermes-full-matrix-validation.yml > .github/workflows/bench2-hermes-full-matrix-validation.yml
          python -m py_compile scripts/run_bench2_hermes_batch.py scripts/validate_bench2_hermes_execution.py
          python -m unittest -v tests.test_bench2_hermes_plan tests.test_bench2_hermes_canary_closeout tests.test_bench2_hermes_execution
          python scripts/validate_bench2_hermes_plan.py --output /tmp/bench2-plan.json
          python scripts/validate_bench2_hermes_canary_closeout.py --output /tmp/bench2-closeout.json
          python scripts/validate_bench2_hermes_execution.py --output /tmp/bench2-execution.json
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/run_bench2_hermes_batch.py tests/test_bench2_hermes_execution.py config/bench2-hermes-orchestrator-oneshot.json reports/BENCH-2-HERMES-FULL-MATRIX-INVALID-29269445368 .gitattributes STATUS.md .github/workflows/bench2-hermes-full-matrix-validation.yml
          git commit -m 'Fix BENCH-2 run output directory boundary'
          git push origin HEAD:fix/bench2-run-output-dir-and-invalid-closeout
