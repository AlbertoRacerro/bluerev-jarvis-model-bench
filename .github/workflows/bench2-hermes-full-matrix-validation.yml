name: BENCH-2 Hermes full-matrix validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-verify:
    if: github.head_ref == 'fix/bench2-run-once-output-dir-v2' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/bench2-run-once-output-dir-v2
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Patch wrapper regression test and reviewed hash
        shell: bash
        run: |
          git fetch origin main --depth=1
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('tests/test_bench2_hermes_execution.py')
          text = path.read_text(encoding='utf-8')
          replacement = '''    def test_v2_wrapper_creates_directory_at_run_once_boundary(self):
              with tempfile.TemporaryDirectory() as directory:
                  run_dir = Path(directory) / "runs" / "candidate" / "case" / "r1"
                  with mock.patch.object(
                      runner_v2,
                      "_ORIGINAL_RUN_ONCE",
                      return_value={"ok": True},
                  ) as delegated:
                      result = runner_v2._run_once_with_output_dir(
                          output_dir=run_dir,
                          candidate={"candidate_id": "candidate"},
                      )
                  self.assertTrue(run_dir.is_dir())
                  self.assertEqual(result, {"ok": True})
                  delegated.assert_called_once_with(
                      output_dir=run_dir,
                      candidate={"candidate_id": "candidate"},
                  )

              def test_v2_capture_patches_base_after_capture_cleanup_boundary(self):
                  observed = {}

                  def fake_capture(output_dir):
                      observed["patched"] = (
                          runner_v2.base._run_once is runner_v2._run_once_with_output_dir
                      )
                      return runner_v2.base._run_once(
                          output_dir=output_dir / "runs" / "candidate" / "case" / "r1",
                          candidate={"candidate_id": "candidate"},
                      )["code"]

                  with tempfile.TemporaryDirectory() as directory:
                      output_dir = Path(directory) / "artifacts"
                      with (
                          mock.patch.object(runner_v2.base, "capture", side_effect=fake_capture),
                          mock.patch.object(
                              runner_v2,
                              "_ORIGINAL_RUN_ONCE",
                              return_value={"code": 17},
                          ),
                      ):
                          self.assertEqual(runner_v2.capture(output_dir), 17)
                      self.assertTrue(
                          (output_dir / "runs" / "candidate" / "case" / "r1").is_dir()
                      )
                  self.assertTrue(observed["patched"])
                  self.assertIs(runner_v2.base._run_once, runner_v2._ORIGINAL_RUN_ONCE)

'''
          pattern = re.compile(
              r'    def test_v2_wrapper_precreates_exact_batch_directories\(self\):\n.*?(?=    def test_full_matrix_workflow_is_guarded_and_serial)',
              re.S,
          )
          text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit('wrapper test replacement failed')
          old_hash = '07e1fb87b1e21fa3c54976785392490af5796c33aa74551f67afffadc70d5ea6'
          new_hash = '854a14e3d13bd23402b9277fa97cc9e0af6567ef067548ef26c461e75a12f56a'
          if text.count(old_hash) != 1:
              raise SystemExit('wrapper hash target mismatch')
          text = text.replace(old_hash, new_hash, 1)
          path.write_text(text, encoding='utf-8', newline='\n')
          PY
          git show origin/main:.github/workflows/bench2-hermes-full-matrix-validation.yml > .github/workflows/bench2-hermes-full-matrix-validation.yml
          python -m py_compile scripts/run_bench2_hermes_batch_v2.py tests/test_bench2_hermes_execution.py
          python -m unittest -v tests.test_bench2_hermes_plan tests.test_bench2_hermes_canary_closeout tests.test_bench2_hermes_execution
          python scripts/validate_bench2_hermes_execution.py --require-enabled --output /tmp/bench2-execution.json
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/run_bench2_hermes_batch_v2.py tests/test_bench2_hermes_execution.py .github/workflows/bench2-hermes-full-matrix-validation.yml
          git commit -m 'Fix BENCH-2 run-once output directory boundary'
          git push origin HEAD:fix/bench2-run-once-output-dir-v2
