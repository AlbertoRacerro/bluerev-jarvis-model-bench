name: BENCH-2R Hermes S1 observer

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/bench2r-hermes-s1-observer.yml
  workflow_run:
    workflows: ["BENCH-2R Hermes S1 observed preflight"]
    types: [completed]

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Publish observable S1 run state
        uses: actions/github-script@v7
        env:
          TARGET_SHA: 402cb62bd03180f07fc85969ad6ca0ac61619c22
          WORKFLOW_NAME: BENCH-2R Hermes S1 observed preflight
          ISSUE_TITLE: BENCH-2R S1 run observer — 402cb62
        with:
          script: |
            const { owner, repo } = context.repo;
            const targetSha = process.env.TARGET_SHA;

            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              {
                owner,
                repo,
                event: 'push',
                head_sha: targetSha,
                per_page: 100,
              }
            );
            const matches = runs.filter(item => item.name === process.env.WORKFLOW_NAME);
            const run = matches.length === 1 ? matches[0] : null;

            let payload;
            if (!run) {
              payload = {
                schema_version: 'bench.hermes-s1-observer.v1',
                target_sha: targetSha,
                run_found: false,
                matching_run_count: matches.length,
                observer_event: context.eventName,
              };
            } else {
              const jobs = await github.paginate(
                github.rest.actions.listJobsForWorkflowRun,
                {
                  owner,
                  repo,
                  run_id: run.id,
                  filter: 'latest',
                  per_page: 100,
                }
              );
              const artifacts = await github.paginate(
                github.rest.actions.listWorkflowRunArtifacts,
                {
                  owner,
                  repo,
                  run_id: run.id,
                  per_page: 100,
                }
              );
              payload = {
                schema_version: 'bench.hermes-s1-observer.v1',
                target_sha: targetSha,
                run_found: true,
                run: {
                  id: run.id,
                  status: run.status,
                  conclusion: run.conclusion,
                  attempt: run.run_attempt,
                  event: run.event,
                  created_at: run.created_at,
                  updated_at: run.updated_at,
                  html_url: run.html_url,
                },
                jobs: jobs.map(item => ({
                  id: item.id,
                  name: item.name,
                  status: item.status,
                  conclusion: item.conclusion,
                  runner_name: item.runner_name,
                  started_at: item.started_at,
                  completed_at: item.completed_at,
                  steps: (item.steps || []).map(step => ({
                    name: step.name,
                    status: step.status,
                    conclusion: step.conclusion,
                  })),
                })),
                artifacts: artifacts.map(item => ({
                  id: item.id,
                  name: item.name,
                  size_in_bytes: item.size_in_bytes,
                  expired: item.expired,
                  created_at: item.created_at,
                  digest: item.digest || null,
                })),
                observer_event: context.eventName,
              };
            }

            const body = [
              'Deterministic observer for the guarded BENCH-2R Hermes S1 run.',
              '',
              '```json',
              JSON.stringify(payload, null, 2),
              '```',
            ].join('\n');

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'all',
              per_page: 100,
            });
            const existing = issues.find(item => item.title === process.env.ISSUE_TITLE);
            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body,
                state: run && run.status === 'completed' ? 'closed' : 'open',
              });
              core.info(`updated issue #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title: process.env.ISSUE_TITLE,
                body,
              });
              core.info(`created issue #${created.data.number}`);
            }
