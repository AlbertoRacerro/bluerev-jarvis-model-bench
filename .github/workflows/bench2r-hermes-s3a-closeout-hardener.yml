name: BENCH-2R Hermes S3A closeout hardener

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/bench2r-hermes-s3a-closeout-hardener.yml

permissions:
  contents: write
  pull-requests: read

jobs:
  harden:
    runs-on: ubuntu-latest
    steps:
      - name: Add closeout validator, tests and hosted CI to generated draft
        uses: actions/github-script@v7
        env:
          PR_PREFIX: BENCH-2R: close S3A shadow soak
        with:
          script: |
            const { owner, repo } = context.repo;
            const prs = await github.paginate(
              github.rest.pulls.list,
              { owner, repo, state: 'open', per_page: 100 }
            );
            const matches = prs.filter(item => item.title.startsWith(process.env.PR_PREFIX));
            if (matches.length !== 1) {
              core.setFailed(`expected one generated S3A closeout PR, observed ${matches.length}`);
              return;
            }
            const pr = matches[0];
            const branch = pr.head.ref;

            async function getFile(path) {
              try {
                const response = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
                return response.data;
              } catch (error) {
                if (error.status === 404) return null;
                throw error;
              }
            }

            async function putFile(path, content, message) {
              const existing = await getFile(path);
              const payload = {
                owner,
                repo,
                path,
                branch,
                message,
                content: Buffer.from(content, 'utf8').toString('base64'),
              };
              if (existing && existing.sha) payload.sha = existing.sha;
              await github.rest.repos.createOrUpdateFileContents(payload);
            }

            const validator = `from __future__ import annotations

import argparse
import json
from pathlib import Path
from typing import Any

ROOT = Path(__file__).resolve().parents[1]
SUMMARY_PATH = ROOT / "reports/BENCH-2R-HERMES-S3A-CLOSEOUT/summary.json"
SUMMARY_MD_PATH = ROOT / "reports/BENCH-2R-HERMES-S3A-CLOSEOUT/summary.md"
MARKER_PATH = ROOT / "config/bench2r-hermes-s3a-marker.json"
EXPECTED_SEEDS = [17, 42, 271828, 314159, 8675309]


class HermesS3ACloseoutError(RuntimeError):
    pass


def _reject_duplicates(pairs: list[tuple[str, Any]]) -> dict[str, Any]:
    result: dict[str, Any] = {}
    for key, value in pairs:
        if key in result:
            raise ValueError(f"duplicate JSON key: {key}")
        result[key] = value
    return result


def _load(path: Path) -> dict[str, Any]:
    try:
        value = json.loads(path.read_text(encoding="utf-8"), object_pairs_hook=_reject_duplicates)
    except (OSError, UnicodeError, json.JSONDecodeError, ValueError) as exc:
        raise HermesS3ACloseoutError(f"cannot read {path}: {type(exc).__name__}: {exc}") from exc
    if not isinstance(value, dict):
        raise HermesS3ACloseoutError(f"{path} must contain an object")
    return value


def _integer(value: Any, label: str) -> int:
    if not isinstance(value, int) or isinstance(value, bool):
        raise HermesS3ACloseoutError(f"{label} must be an integer")
    return value


def validate() -> dict[str, Any]:
    summary = _load(SUMMARY_PATH)
    marker = _load(MARKER_PATH)
    if summary.get("schema_version") != "bench.hermes-s3a-closeout.v1":
        raise HermesS3ACloseoutError("S3A closeout schema drifted")
    status = summary.get("status")
    if status not in {"shadow_soak_passed_requires_human_review", "shadow_soak_failed"}:
        raise HermesS3ACloseoutError("S3A closeout status is invalid")
    passed = summary.get("passed")
    if not isinstance(passed, bool):
        raise HermesS3ACloseoutError("S3A closeout passed flag is invalid")
    if passed is not (status == "shadow_soak_passed_requires_human_review"):
        raise HermesS3ACloseoutError("S3A status and passed flag disagree")
    if summary.get("production_status") != "not_promoted":
        raise HermesS3ACloseoutError("S3A closeout promotes production")
    if summary.get("automatic_model_weight_update_allowed") is not False:
        raise HermesS3ACloseoutError("S3A closeout allows model mutation")
    if summary.get("automatic_production_promotion_allowed") is not False:
        raise HermesS3ACloseoutError("S3A closeout allows automatic promotion")

    run = summary.get("run")
    if not isinstance(run, dict):
        raise HermesS3ACloseoutError("S3A run binding is missing")
    _integer(run.get("id"), "run.id")
    if run.get("status") != "completed":
        raise HermesS3ACloseoutError("S3A source run is not completed")
    if run.get("conclusion") != "success":
        raise HermesS3ACloseoutError("S3A source workflow did not complete successfully")

    artifacts = summary.get("artifact_metadata")
    if not isinstance(artifacts, list) or len(artifacts) != 10:
        raise HermesS3ACloseoutError("S3A artifact inventory must contain ten artifacts")
    ids: set[int] = set()
    names: set[str] = set()
    main_count = 0
    preflight_count = 0
    for item in artifacts:
        if not isinstance(item, dict):
            raise HermesS3ACloseoutError("S3A artifact record is invalid")
        artifact_id = _integer(item.get("id"), "artifact.id")
        name = item.get("name")
        digest = item.get("digest")
        if artifact_id in ids or not isinstance(name, str) or name in names:
            raise HermesS3ACloseoutError("S3A artifact identity is duplicated")
        ids.add(artifact_id)
        names.add(name)
        if not isinstance(digest, str) or not digest.startswith("sha256:") or len(digest) != 71:
            raise HermesS3ACloseoutError("S3A artifact digest is invalid")
        if item.get("expired") is not False:
            raise HermesS3ACloseoutError("S3A artifact is expired")
        if name.startswith("bench2r-hermes-s3a-preflight-"):
            preflight_count += 1
        elif name.startswith("bench2r-hermes-s3a-"):
            main_count += 1
    if (main_count, preflight_count) != (5, 5):
        raise HermesS3ACloseoutError("S3A main/preflight artifact split drifted")

    batches = summary.get("batches")
    if not isinstance(batches, list) or len(batches) != 5:
        raise HermesS3ACloseoutError("S3A batch inventory drifted")
    seeds: list[int] = []
    for batch in batches:
        if not isinstance(batch, dict):
            raise HermesS3ACloseoutError("S3A batch record is invalid")
        selection = batch.get("selection")
        if not isinstance(selection, dict):
            raise HermesS3ACloseoutError("S3A batch selection is missing")
        seeds.append(_integer(selection.get("seed"), "batch.selection.seed"))
        if batch.get("run_count") != 10:
            raise HermesS3ACloseoutError("S3A batch run count drifted")
        if batch.get("manifest_mismatch_count") != 0:
            raise HermesS3ACloseoutError("S3A internal manifest mismatch is present")
    if sorted(seeds) != EXPECTED_SEEDS:
        raise HermesS3ACloseoutError("S3A seed inventory drifted")

    aggregate = summary.get("aggregate")
    acceptance = summary.get("acceptance")
    if not isinstance(aggregate, dict) or not isinstance(acceptance, dict):
        raise HermesS3ACloseoutError("S3A aggregate or acceptance block is missing")
    if aggregate.get("runs") != 50 or aggregate.get("unique_runs") != 50:
        raise HermesS3ACloseoutError("S3A run inventory is incomplete")
    if acceptance.get("automatic_production_promotion_allowed") is not False:
        raise HermesS3ACloseoutError("S3A acceptance allows automatic promotion")

    errors = summary.get("errors")
    failed_runs = summary.get("failed_runs")
    if not isinstance(errors, list) or not isinstance(failed_runs, list):
        raise HermesS3ACloseoutError("S3A errors or failed-run inventory is invalid")
    if passed:
        required_aggregate = {
            "infrastructure_valid": 50,
            "raw_orchestration_pass": 50,
            "nominal_finalized_output_pass": 30,
            "negative_fail_closed_pass": 20,
            "shadow_pass": 50,
            "long_context_runs": 10,
            "long_context_token_gate_pass": 10,
        }
        for key, expected in required_aggregate.items():
            if aggregate.get(key) != expected:
                raise HermesS3ACloseoutError(f"passing S3A aggregate drifted: {key}")
        required_acceptance = {
            "batch_reports_exact",
            "run_inventory_exact",
            "seed_inventory_exact",
            "all_runs_infrastructure_valid",
            "all_runs_raw_orchestration_pass",
            "all_nominal_finalized_output_pass",
            "all_negative_controls_fail_closed",
            "all_runs_shadow_pass",
            "all_long_context_runs_meet_token_gate",
            "artifact_inventory_exact",
            "internal_manifests_valid",
        }
        if any(acceptance.get(key) is not True for key in required_acceptance):
            raise HermesS3ACloseoutError("passing S3A acceptance contains a false gate")
        if errors or failed_runs:
            raise HermesS3ACloseoutError("passing S3A closeout preserves errors or failed runs")
    else:
        if aggregate.get("shadow_pass") == 50 and not errors and not failed_runs:
            raise HermesS3ACloseoutError("failed S3A closeout has no attributable failure")

    expected_marker = {
        "schema_version": "bench.hermes-s3a-shadow-soak.v1",
        "enabled": False,
        "candidate_id": "gemma4-12b-it-qat",
        "batch_count": 5,
        "batch_size": 1,
        "seeds": EXPECTED_SEEDS,
        "repetitions": 2,
        "expected_runs": 50,
    }
    if marker != expected_marker:
        raise HermesS3ACloseoutError("S3A marker was not closed exactly")
    markdown = SUMMARY_MD_PATH.read_text(encoding="utf-8")
    if str(run["id"]) not in markdown or status not in markdown or "not_promoted" not in markdown:
        raise HermesS3ACloseoutError("S3A Markdown closeout is not bound to the decision")
    return {
        "schema_version": "bench.hermes-s3a-closeout-validation.v1",
        "status": "valid",
        "decision": status,
        "passed": passed,
        "run_id": run["id"],
        "shadow_pass": aggregate.get("shadow_pass"),
        "artifact_count": len(artifacts),
        "production_status": "not_promoted",
        "automatic_production_promotion_allowed": False,
    }


def main() -> int:
    parser = argparse.ArgumentParser(description="Validate BENCH-2R Hermes S3A closeout.")
    parser.add_argument("--output", type=Path)
    args = parser.parse_args()
    try:
        payload = validate()
        code = 0
    except (HermesS3ACloseoutError, OSError, ValueError) as exc:
        payload = {
            "schema_version": "bench.hermes-s3a-closeout-validation.v1",
            "status": "invalid",
            "error_type": type(exc).__name__,
            "error": str(exc),
        }
        code = 2
    text = json.dumps(payload, indent=2, sort_keys=True) + "\\n"
    if args.output:
        args.output.parent.mkdir(parents=True, exist_ok=True)
        args.output.write_text(text, encoding="utf-8")
    print(text, end="")
    return code


if __name__ == "__main__":
    raise SystemExit(main())
`;

            const tests = `from __future__ import annotations

import copy
import json
import tempfile
import unittest
from pathlib import Path
from unittest import mock

from scripts import validate_bench2r_hermes_s3a_closeout as validator


class HermesS3ACloseoutTests(unittest.TestCase):
    def _temporary_json(self, value: dict) -> tuple[tempfile.TemporaryDirectory, Path]:
        directory = tempfile.TemporaryDirectory()
        path = Path(directory.name) / "value.json"
        path.write_text(json.dumps(value, indent=2) + "\\n", encoding="utf-8")
        return directory, path

    def test_reviewed_closeout_validates(self):
        payload = validator.validate()
        self.assertEqual(payload["status"], "valid")
        self.assertEqual(payload["production_status"], "not_promoted")
        self.assertFalse(payload["automatic_production_promotion_allowed"])
        self.assertEqual(payload["artifact_count"], 10)

    def test_production_promotion_is_rejected(self):
        summary = validator._load(validator.SUMMARY_PATH)
        summary["production_status"] = "promoted"
        directory, path = self._temporary_json(summary)
        self.addCleanup(directory.cleanup)
        with mock.patch.object(validator, "SUMMARY_PATH", path):
            with self.assertRaisesRegex(validator.HermesS3ACloseoutError, "promotes production"):
                validator.validate()

    def test_enabled_marker_is_rejected(self):
        marker = validator._load(validator.MARKER_PATH)
        marker["enabled"] = True
        directory, path = self._temporary_json(marker)
        self.addCleanup(directory.cleanup)
        with mock.patch.object(validator, "MARKER_PATH", path):
            with self.assertRaisesRegex(validator.HermesS3ACloseoutError, "marker was not closed"):
                validator.validate()

    def test_artifact_digest_drift_is_rejected(self):
        summary = validator._load(validator.SUMMARY_PATH)
        summary["artifact_metadata"][0]["digest"] = "sha256:bad"
        directory, path = self._temporary_json(summary)
        self.addCleanup(directory.cleanup)
        with mock.patch.object(validator, "SUMMARY_PATH", path):
            with self.assertRaisesRegex(validator.HermesS3ACloseoutError, "artifact digest is invalid"):
                validator.validate()

    def test_status_and_passed_flag_must_agree(self):
        summary = validator._load(validator.SUMMARY_PATH)
        summary["passed"] = not summary["passed"]
        directory, path = self._temporary_json(summary)
        self.addCleanup(directory.cleanup)
        with mock.patch.object(validator, "SUMMARY_PATH", path):
            with self.assertRaisesRegex(validator.HermesS3ACloseoutError, "status and passed flag disagree"):
                validator.validate()


if __name__ == "__main__":
    unittest.main()
`;

            const workflow = `name: BENCH-2R Hermes S3A closeout validation

on:
  pull_request:
    paths:
      - config/bench2r-hermes-s3a-marker.json
      - reports/BENCH-2R-HERMES-S3A-CLOSEOUT/**
      - scripts/validate_bench2r_hermes_s3a_closeout.py
      - tests/test_bench2r_hermes_s3a_closeout.py
      - .github/workflows/bench2r-hermes-s3a-closeout-validation.yml

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate S3A closeout evidence and promotion boundary
        shell: bash
        run: |
          mkdir -p artifacts
          set -o pipefail
          {
            python -m unittest -v tests.test_bench2r_hermes_s3a_closeout
            python -m scripts.validate_bench2r_hermes_s3a_closeout \\
              --output artifacts/bench2r-s3a-closeout-validation.json
            python -m py_compile \\
              scripts/validate_bench2r_hermes_s3a_closeout.py \\
              tests/test_bench2r_hermes_s3a_closeout.py
          } 2>&1 | tee artifacts/validation.log
      - name: Upload closeout validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench2r-hermes-s3a-closeout-validation
          path: artifacts/
          if-no-files-found: error
          retention-days: 45
`;

