name: BENCH-2R Hermes S3A closeout observer

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/bench2r-hermes-s3a-closeout-observer.yml

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - name: Discover completed S3A run and artifacts
        id: discover
        uses: actions/github-script@v7
        env:
          TARGET_SHA: c1cce366128b1678fd6fc0e2a5718b97dad7a9fc
          WORKFLOW_NAME: BENCH-2R Hermes S3A shadow soak
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              {
                owner,
                repo,
                event: 'push',
                head_sha: process.env.TARGET_SHA,
                per_page: 100,
              }
            );
            const matches = runs.filter(item => item.name === process.env.WORKFLOW_NAME);
            if (matches.length !== 1) {
              core.setFailed(`expected one S3A run, observed ${matches.length}`);
              return;
            }
            const run = matches[0];
            if (run.status !== 'completed') {
              core.setFailed(`S3A run is not completed: ${run.status}`);
              return;
            }
            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              { owner, repo, run_id: run.id, per_page: 100 }
            );
            fs.writeFileSync(
              'artifact-metadata.json',
              JSON.stringify({
                schema_version: 'bench.hermes-s3a-artifact-metadata.v1',
                target_sha: process.env.TARGET_SHA,
                run: {
                  id: run.id,
                  attempt: run.run_attempt,
                  status: run.status,
                  conclusion: run.conclusion,
                  html_url: run.html_url,
                  created_at: run.created_at,
                  updated_at: run.updated_at,
                },
                artifacts: artifacts.map(item => ({
                  id: item.id,
                  name: item.name,
                  size_in_bytes: item.size_in_bytes,
                  digest: item.digest || null,
                  expired: item.expired,
                })),
              }, null, 2)
            );
            core.setOutput('run_id', String(run.id));
      - name: Download all S3A artifacts
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.discover.outputs.run_id }}
          path: downloaded
      - name: Aggregate and verify S3A evidence
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations

          import collections
          import hashlib
          import json
          import statistics
          from pathlib import Path

          ROOT = Path('downloaded')
          metadata = json.loads(Path('artifact-metadata.json').read_text(encoding='utf-8'))
          errors: list[str] = []
          batches: list[dict] = []
          all_runs: list[dict] = []
          expected_seeds = [17, 42, 271828, 314159, 8675309]

          report_paths = sorted(ROOT.rglob('batch-report.json'))
          if len(report_paths) != 5:
              errors.append(f'expected 5 batch reports, observed {len(report_paths)}')

          for report_path in report_paths:
              batch_root = report_path.parent
              report = json.loads(report_path.read_text(encoding='utf-8'))
              manifest_path = batch_root / 'manifest.json'
              if not manifest_path.is_file():
                  errors.append(f'missing batch manifest: {batch_root}')
                  continue
              manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
              mismatches: list[str] = []
              for relative, record in manifest.get('artifacts', {}).items():
                  path = batch_root / relative
                  if not path.is_file():
                      mismatches.append(f'{relative}:missing')
                      continue
                  data = path.read_bytes()
                  if hashlib.sha256(data).hexdigest() != record.get('sha256'):
                      mismatches.append(f'{relative}:sha256')
                  if len(data) != record.get('size_bytes'):
                      mismatches.append(f'{relative}:size')
              if mismatches:
                  errors.append(f'{batch_root.name} manifest mismatches: {mismatches[:10]}')
              runs = report.get('runs')
              if not isinstance(runs, list) or len(runs) != 10:
                  errors.append(f'{batch_root.name} run count invalid: {len(runs) if isinstance(runs, list) else None}')
                  runs = []
              all_runs.extend(runs)
              batches.append({
                  'path': batch_root.as_posix(),
                  'selection': report.get('selection'),
                  'counts': report.get('counts'),
                  'decision': report.get('decision'),
                  'run_count': len(runs),
                  'manifest_artifact_count': len(manifest.get('artifacts', {})),
                  'manifest_mismatch_count': len(mismatches),
              })

          identities = [
              (item.get('case_id'), item.get('seed'), item.get('repetition'))
              for item in all_runs
          ]
          unique_identities = set(identities)
          if len(all_runs) != 50:
              errors.append(f'expected 50 runs, observed {len(all_runs)}')
          if len(unique_identities) != 50:
              errors.append(f'expected 50 unique run identities, observed {len(unique_identities)}')
          observed_seeds = sorted({item.get('seed') for item in all_runs if isinstance(item.get('seed'), int)})
          if observed_seeds != expected_seeds:
              errors.append(f'seed inventory drifted: {observed_seeds}')

          status_counts = collections.Counter(item.get('candidate_result_status') for item in all_runs)
          outcome_counts = collections.Counter(item.get('outcome_class') for item in all_runs)
          infra = sum(item.get('infrastructure_valid') is True for item in all_runs)
          orchestration = sum(item.get('raw_orchestration_pass') is True for item in all_runs)
          presentation = sum(item.get('raw_presentation_pass') is True for item in all_runs)
          nominal = sum(item.get('nominal_finalized_output_pass') is True for item in all_runs)
          negative = sum(item.get('negative_fail_closed_pass') is True for item in all_runs)
          shadow = sum(item.get('shadow_pass') is True for item in all_runs)
          long_runs = [
              item for item in all_runs
              if item.get('case_id') == 's3a-stop-long-context-untrusted-003'
          ]
          long_token_pass = sum(
              isinstance(item.get('input_tokens'), int) and item['input_tokens'] >= 16000
              for item in long_runs
          )
          durations = [
              float(item['duration_seconds'])
              for item in all_runs
              if isinstance(item.get('duration_seconds'), (int, float))
              and not isinstance(item.get('duration_seconds'), bool)
          ]
          if len(durations) != len(all_runs):
              errors.append(f'duration inventory incomplete: {len(durations)}/{len(all_runs)}')

          main_artifacts = [
              item for item in metadata.get('artifacts', [])
              if item.get('name', '').startswith('bench2r-hermes-s3a-')
              and '-preflight-' not in item.get('name', '')
          ]
          preflight_artifacts = [
              item for item in metadata.get('artifacts', [])
              if item.get('name', '').startswith('bench2r-hermes-s3a-preflight-')
          ]
          if len(main_artifacts) != 5:
              errors.append(f'expected 5 main artifacts, observed {len(main_artifacts)}')
          if len(preflight_artifacts) != 5:
              errors.append(f'expected 5 preflight artifacts, observed {len(preflight_artifacts)}')
          if any(item.get('expired') for item in metadata.get('artifacts', [])):
              errors.append('an S3A artifact is already expired')
          if any(not isinstance(item.get('digest'), str) for item in metadata.get('artifacts', [])):
              errors.append('an S3A artifact lacks GitHub digest metadata')

          acceptance = {
              'batch_reports_exact': len(report_paths) == 5,
              'run_inventory_exact': len(all_runs) == 50 and len(unique_identities) == 50,
              'seed_inventory_exact': observed_seeds == expected_seeds,
              'all_runs_infrastructure_valid': infra == 50,
              'all_runs_raw_orchestration_pass': orchestration == 50,
              'all_nominal_finalized_output_pass': nominal == 30,
              'all_negative_controls_fail_closed': negative == 20,
              'all_runs_shadow_pass': shadow == 50,
              'all_long_context_runs_meet_token_gate': len(long_runs) == 10 and long_token_pass == 10,
              'artifact_inventory_exact': len(main_artifacts) == 5 and len(preflight_artifacts) == 5,
              'internal_manifests_valid': not any(batch['manifest_mismatch_count'] for batch in batches),
              'automatic_production_promotion_allowed': False,
          }
          passed = not errors and all(
              value is True
              for key, value in acceptance.items()
              if key != 'automatic_production_promotion_allowed'
          ) and acceptance['automatic_production_promotion_allowed'] is False

          failures = [item for item in all_runs if item.get('shadow_pass') is not True]
          result = {
              'schema_version': 'bench.hermes-s3a-closeout-observer.v1',
              'status': 'shadow_soak_passed_requires_human_review' if passed else 'shadow_soak_failed',
              'passed': passed,
              'production_status': 'not_promoted',
              'run': metadata.get('run'),
              'artifact_metadata': metadata.get('artifacts'),
              'batches': batches,
              'aggregate': {
                  'runs': len(all_runs),
                  'unique_runs': len(unique_identities),
                  'status_counts': dict(status_counts),
                  'outcome_counts': dict(outcome_counts),
                  'infrastructure_valid': infra,
                  'raw_orchestration_pass': orchestration,
                  'raw_presentation_pass': presentation,
                  'nominal_finalized_output_pass': nominal,
                  'negative_fail_closed_pass': negative,
                  'shadow_pass': shadow,
                  'long_context_runs': len(long_runs),
                  'long_context_token_gate_pass': long_token_pass,
                  'duration_seconds_min': min(durations) if durations else None,
                  'duration_seconds_median': statistics.median(durations) if durations else None,
                  'duration_seconds_max': max(durations) if durations else None,
                  'duration_seconds_total': sum(durations) if durations else None,
              },
              'acceptance': acceptance,
              'errors': errors,
              'failed_runs': failures,
          }
          Path('s3a-closeout-analysis.json').write_text(
              json.dumps(result, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )

          lines = [
              '# BENCH-2R Hermes S3A closeout observer',
              '',
              f"**Decision:** `{result['status']}`",
              f"**Production:** `{result['production_status']}`",
              '',
              f"- Runs: {len(all_runs)}/50",
              f"- Infrastructure valid: {infra}/50",
              f"- Raw orchestration pass: {orchestration}/50",
              f"- Nominal finalized output: {nominal}/30",
              f"- Negative fail-closed: {negative}/20",
              f"- Shadow pass: {shadow}/50",
              f"- Raw presentation pass (observational): {presentation}/50",
              f"- Long-context token gate: {long_token_pass}/10",
              f"- Main artifacts: {len(main_artifacts)}/5",
              f"- Preflight artifacts: {len(preflight_artifacts)}/5",
              f"- Internal manifest errors: {sum(batch['manifest_mismatch_count'] for batch in batches)}",
              '',
              '## Acceptance',
          ]
          for key, value in acceptance.items():
              lines.append(f"- `{key}`: `{value}`")
          if errors:
              lines += ['', '## Evidence errors'] + [f'- {item}' for item in errors]
          if failures:
              lines += ['', '## Failed runs']
              for item in failures:
                  lines.append(
                      '- '
                      f"case=`{item.get('case_id')}` seed=`{item.get('seed')}` "
                      f"rep=`{item.get('repetition')}` status=`{item.get('candidate_result_status')}` "
                      f"infra=`{item.get('infrastructure_valid')}` "
                      f"orchestration=`{item.get('raw_orchestration_pass')}` "
                      f"nominal=`{item.get('nominal_finalized_output_pass')}` "
                      f"negative=`{item.get('negative_fail_closed_pass')}`"
                  )
          Path('s3a-closeout-analysis.md').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
      - name: Publish S3A closeout analysis issue
        uses: actions/github-script@v7
        env:
          ISSUE_PREFIX: BENCH-2R S3A closeout analysis
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const result = JSON.parse(fs.readFileSync('s3a-closeout-analysis.json', 'utf8'));
            const markdown = fs.readFileSync('s3a-closeout-analysis.md', 'utf8');
            const title = result.passed
              ? `${process.env.ISSUE_PREFIX} — PASS ${result.aggregate.shadow_pass}/50`
              : `${process.env.ISSUE_PREFIX} — FAIL ${result.aggregate.shadow_pass}/50`;
            const body = [
              markdown,
              '',
              '<details><summary>Machine-readable analysis</summary>',
              '',
              '```json',
              JSON.stringify(result, null, 2),
              '```',
              '</details>',
            ].join('\n');
            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              { owner, repo, state: 'all', per_page: 100 }
            );
            const existing = issues.find(item => item.title.startsWith(process.env.ISSUE_PREFIX));
            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                title,
                body,
                state: 'closed',
              });
            } else {
              const created = await github.rest.issues.create({ owner, repo, title, body });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: created.data.number,
                state: 'closed',
              });
            }
      - name: Upload closeout observer analysis
        uses: actions/upload-artifact@v4
        with:
          name: bench2r-hermes-s3a-closeout-observer
          path: |
            artifact-metadata.json
            s3a-closeout-analysis.json
            s3a-closeout-analysis.md
          if-no-files-found: error
          retention-days: 45
