name: BENCH-2R Hermes S3A closeout PR preparer

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/bench2r-hermes-s3a-closeout-pr.yml

permissions:
  actions: read
  contents: write
  issues: read
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Create reviewable S3A closeout branch and draft PR
        uses: actions/github-script@v7
        env:
          ISSUE_PREFIX: BENCH-2R S3A closeout analysis
        with:
          script: |
            const { owner, repo } = context.repo;
            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              { owner, repo, state: 'all', per_page: 100 }
            );
            const matches = issues.filter(item => item.title.startsWith(process.env.ISSUE_PREFIX));
            if (matches.length !== 1) {
              core.setFailed(`expected one S3A closeout analysis issue, observed ${matches.length}`);
              return;
            }
            const issue = matches[0];
            const blocks = [...issue.body.matchAll(/```json\n([\s\S]*?)\n```/g)];
            if (blocks.length === 0) {
              core.setFailed('S3A closeout issue lacks machine-readable JSON');
              return;
            }
            let result;
            try {
              result = JSON.parse(blocks[blocks.length - 1][1]);
            } catch (error) {
              core.setFailed(`cannot parse S3A closeout JSON: ${error}`);
              return;
            }
            if (!result.run || !Number.isInteger(result.run.id)) {
              core.setFailed('S3A closeout run binding is missing');
              return;
            }
            if (!['shadow_soak_passed_requires_human_review', 'shadow_soak_failed'].includes(result.status)) {
              core.setFailed(`unexpected S3A closeout status: ${result.status}`);
              return;
            }
            if (result.production_status !== 'not_promoted') {
              core.setFailed('S3A closeout attempted production promotion');
              return;
            }

            const defaultBranch = 'main';
            const baseRef = await github.rest.git.getRef({ owner, repo, ref: `heads/${defaultBranch}` });
            const baseSha = baseRef.data.object.sha;
            const branch = `bench2r/s3a-closeout-${result.run.id}`;
            let branchExists = false;
            try {
              await github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` });
              branchExists = true;
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            if (!branchExists) {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/heads/${branch}`,
                sha: baseSha,
              });
            }

            async function getFile(path) {
              try {
                const response = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
                return response.data;
              } catch (error) {
                if (error.status === 404) return null;
                throw error;
              }
            }

            async function putFile(path, content, message) {
              const existing = await getFile(path);
              const payload = {
                owner,
                repo,
                path,
                branch,
                message,
                content: Buffer.from(content, 'utf8').toString('base64'),
              };
              if (existing && existing.sha) payload.sha = existing.sha;
              await github.rest.repos.createOrUpdateFileContents(payload);
            }

            const markerPath = 'config/bench2r-hermes-s3a-marker.json';
            const markerFile = await getFile(markerPath);
            if (!markerFile || markerFile.type !== 'file') {
              core.setFailed('S3A marker file is missing on closeout branch');
              return;
            }
            const marker = JSON.parse(Buffer.from(markerFile.content, 'base64').toString('utf8'));
            marker.enabled = false;
            await putFile(
              markerPath,
              JSON.stringify(marker, null, 2) + '\n',
              'Disable completed BENCH-2R Hermes S3A shadow soak'
            );

            const enriched = {
              ...result,
              schema_version: 'bench.hermes-s3a-closeout.v1',
              source_analysis_issue: {
                number: issue.number,
                url: issue.html_url,
                title: issue.title,
              },
              closeout_generation: {
                workflow: 'BENCH-2R Hermes S3A closeout PR preparer',
                base_sha: baseSha,
                generated_at_utc: new Date().toISOString(),
              },
              automatic_model_weight_update_allowed: false,
              automatic_production_promotion_allowed: false,
              production_status: 'not_promoted',
            };
            const reportDir = 'reports/BENCH-2R-HERMES-S3A-CLOSEOUT';
            await putFile(
              `${reportDir}/summary.json`,
              JSON.stringify(enriched, null, 2) + '\n',
              'Add BENCH-2R Hermes S3A closeout evidence'
            );

            const aggregate = result.aggregate || {};
            const acceptance = result.acceptance || {};
            const failureLines = (result.failed_runs || []).map(item =>
              `- case=\`${item.case_id}\` seed=\`${item.seed}\` rep=\`${item.repetition}\` ` +
              `status=\`${item.candidate_result_status}\` infra=\`${item.infrastructure_valid}\` ` +
              `orchestration=\`${item.raw_orchestration_pass}\` shadow=\`${item.shadow_pass}\``
            );
            const artifactLines = (result.artifact_metadata || []).map(item =>
              `- \`${item.name}\` — id \`${item.id}\`, digest \`${item.digest}\`, size \`${item.size_in_bytes}\``
            );
            const acceptanceLines = Object.entries(acceptance).map(([key, value]) =>
              `- \`${key}\`: \`${value}\``
            );
            const md = [
              '# BENCH-2R Hermes S3A closeout',
              '',
              `**Decision:** \`${result.status}\``,
              '',
              `**Workflow run:** \`${result.run.id}\``,
              '',
              `**Execution SHA:** \`${result.run.head_sha || 'bound in artifact metadata'}\``,
              '',
              `**Production status:** \`not_promoted\``,
              '',
              '## Aggregate',
              '',
              `- Runs: ${aggregate.runs}/50`,
              `- Unique runs: ${aggregate.unique_runs}/50`,
              `- Infrastructure valid: ${aggregate.infrastructure_valid}/50`,
              `- Raw orchestration pass: ${aggregate.raw_orchestration_pass}/50`,
              `- Nominal finalized output: ${aggregate.nominal_finalized_output_pass}/30`,
              `- Negative fail-closed: ${aggregate.negative_fail_closed_pass}/20`,
              `- Shadow pass: ${aggregate.shadow_pass}/50`,
              `- Raw presentation pass, observational only: ${aggregate.raw_presentation_pass}/50`,
              `- Long-context token gate: ${aggregate.long_context_token_gate_pass}/10`,
              '',
              '## Acceptance',
              '',
              ...acceptanceLines,
              '',
              '## GitHub artifact bindings',
              '',
              ...artifactLines,
              '',
              '## Evidence errors',
              '',
              ...(result.errors && result.errors.length ? result.errors.map(item => `- ${item}`) : ['- None']),
              '',
              '## Failed runs',
              '',
              ...(failureLines.length ? failureLines : ['- None']),
              '',
              '## Decision boundary',
              '',
              '- No automatic model-weight update.',
              '- No automatic production promotion.',
              '- Passing S3A requires human review before any later production gate.',
              '- Production remains `not_promoted` regardless of shadow result.',
              '',
            ].join('\n');
            await putFile(
              `${reportDir}/summary.md`,
              md,
              'Document BENCH-2R Hermes S3A closeout decision'
            );

            const openPrs = await github.paginate(
              github.rest.pulls.list,
              { owner, repo, state: 'open', head: `${owner}:${branch}`, per_page: 100 }
            );
            const title = result.passed
              ? `BENCH-2R: close S3A shadow soak PASS ${aggregate.shadow_pass}/50`
              : `BENCH-2R: close S3A shadow soak FAIL ${aggregate.shadow_pass}/50`;
            const prBody = [
              '## Generated closeout',
              '',
              `Source analysis: #${issue.number}`,
              `Run: \`${result.run.id}\``,
              `Decision: \`${result.status}\``,
              `Shadow pass: \`${aggregate.shadow_pass}/50\``,
              '',
              'This draft resets the S3A marker and freezes the machine-readable and human-readable closeout evidence.',
              '',
              'It does not promote production, update weights or modify the router.',
            ].join('\n');
            if (openPrs.length === 0) {
              await github.rest.pulls.create({
                owner,
                repo,
                title,
                head: branch,
                base: defaultBranch,
                body: prBody,
                draft: true,
              });
            } else {
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: openPrs[0].number,
                title,
                body: prBody,
              });
            }
