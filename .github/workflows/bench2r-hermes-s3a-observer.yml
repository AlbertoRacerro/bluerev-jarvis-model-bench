name: BENCH-2R Hermes S3A observer

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/bench2r-hermes-s3a-observer.yml
  workflow_run:
    workflows: ["BENCH-2R Hermes S3A shadow soak"]
    types: [completed]

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Publish S3A run state
        uses: actions/github-script@v7
        env:
          TARGET_SHA: b2d775541ef3617ab4226e7ca922bc5a8f0272f7
          WORKFLOW_NAME: BENCH-2R Hermes S3A shadow soak
          ISSUE_TITLE: BENCH-2R S3A run observer — b2d7755
        with:
          script: |
            const { owner, repo } = context.repo;
            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              {
                owner,
                repo,
                event: 'push',
                head_sha: process.env.TARGET_SHA,
                per_page: 100,
              }
            );
            const matches = runs.filter(item => item.name === process.env.WORKFLOW_NAME);
            const run = matches.length === 1 ? matches[0] : null;
            let payload;
            if (!run) {
              payload = {
                schema_version: 'bench.hermes-s3a-observer.v1',
                target_sha: process.env.TARGET_SHA,
                run_found: false,
                matching_run_count: matches.length,
              };
            } else {
              const jobs = await github.paginate(
                github.rest.actions.listJobsForWorkflowRun,
                { owner, repo, run_id: run.id, filter: 'latest', per_page: 100 }
              );
              const artifacts = await github.paginate(
                github.rest.actions.listWorkflowRunArtifacts,
                { owner, repo, run_id: run.id, per_page: 100 }
              );
              payload = {
                schema_version: 'bench.hermes-s3a-observer.v1',
                target_sha: process.env.TARGET_SHA,
                run_found: true,
                run: {
                  id: run.id,
                  attempt: run.run_attempt,
                  status: run.status,
                  conclusion: run.conclusion,
                  created_at: run.created_at,
                  updated_at: run.updated_at,
                  html_url: run.html_url,
                },
                jobs: jobs.map(job => ({
                  id: job.id,
                  name: job.name,
                  status: job.status,
                  conclusion: job.conclusion,
                  runner_name: job.runner_name,
                  started_at: job.started_at,
                  completed_at: job.completed_at,
                  steps: (job.steps || []).map(step => ({
                    name: step.name,
                    status: step.status,
                    conclusion: step.conclusion,
                  })),
                })),
                artifacts: artifacts.map(item => ({
                  id: item.id,
                  name: item.name,
                  size_in_bytes: item.size_in_bytes,
                  digest: item.digest || null,
                  expired: item.expired,
                })),
              };
            }
            const body = [
              'Deterministic read-only observer for BENCH-2R Hermes S3A.',
              '',
              '```json',
              JSON.stringify(payload, null, 2),
              '```',
            ].join('\n');
            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              { owner, repo, state: 'all', per_page: 100 }
            );
            const existing = issues.find(item => item.title === process.env.ISSUE_TITLE);
            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body,
                state: run && run.status === 'completed' ? 'closed' : 'open',
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title: process.env.ISSUE_TITLE,
                body,
              });
            }
