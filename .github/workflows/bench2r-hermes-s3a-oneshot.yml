name: BENCH-2R Hermes S3A shadow soak

on:
  push:
    branches: [main]
    paths:
      - config/bench2r-hermes-s3a-marker.json

permissions:
  contents: read

concurrency:
  group: bench2r-hermes-s3a-shadow-soak
  cancel-in-progress: true

jobs:
  shadow-soak:
    if: startsWith(github.event.head_commit.message, 'Activate BENCH-2R Hermes S3A shadow soak')
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        batch: [0, 1, 2, 3, 4]
    runs-on: [self-hosted, Windows, X64, bluerev-bench]
    timeout-minutes: 180
    env:
      BENCH2R_HERMES_S3A_BATCH_INDEX: ${{ matrix.batch }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Validate authorized S3A runtime contract
        shell: cmd
        run: python -m scripts.run_bench2r_hermes_s3a_preflight
      - name: Upload S3A preflight evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench2r-hermes-s3a-preflight-${{ github.run_id }}-${{ github.run_attempt }}-b${{ matrix.batch }}
          path: artifacts/preflight/
          if-no-files-found: error
          retention-days: 21
      - name: Capture S3A batch with Windows keep-awake
        shell: cmd
        run: python -m scripts.run_bench2r_hermes_s3a_awake capture
      - name: Enforce S3A safe artifact integrity
        if: always()
        shell: cmd
        run: python -m scripts.run_bench2r_hermes_s3a_safe enforce
      - name: Upload S3A evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench2r-hermes-s3a-${{ github.run_id }}-${{ github.run_attempt }}-b${{ matrix.batch }}
          path: artifacts/bench2r-hermes-s3a/
          if-no-files-found: error
          retention-days: 45
