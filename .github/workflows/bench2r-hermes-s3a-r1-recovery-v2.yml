name: Recover BENCH-2R Hermes S3A-R1 residual evidence v2

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/bench2r-hermes-s3a-r1-recovery-v2.yml

permissions:
  contents: read
  issues: write

jobs:
  recover:
    runs-on: [self-hosted, Windows, X64, bluerev-bench]
    timeout-minutes: 15
    steps:
      - name: Scan complete self-hosted work root without checkout
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const root = 'C:\\actions-runner\\_work';
            const target = path.join(process.env.RUNNER_TEMP, 's3a-r1-recovery-v2');
            fs.rmSync(target, { recursive: true, force: true });
            fs.mkdirSync(target, { recursive: true });

            const artifactDirs = [];
            const tempDirs = [];
            const diagnosticFiles = [];
            const errors = [];
            const seen = new Set();

            function walk(dir, depth = 0) {
              if (depth > 18 || seen.has(dir) || dir === target || dir.startsWith(target + path.sep)) return;
              seen.add(dir);
              let entries;
              try {
                entries = fs.readdirSync(dir, { withFileTypes: true });
              } catch (error) {
                errors.push({ path: dir, error: String(error) });
                return;
              }
              for (const entry of entries) {
                const full = path.join(dir, entry.name);
                if (full === target || full.startsWith(target + path.sep)) continue;
                if (entry.isDirectory()) {
                  if (entry.name === 'bench2r-hermes-s3a-r1-repair') artifactDirs.push(full);
                  if (entry.name.startsWith('bench2r-s3a-r1-') || entry.name.startsWith('bench2r-hermes-s3a-r1-')) tempDirs.push(full);
                  walk(full, depth + 1);
                } else if (entry.isFile()) {
                  const lower = full.toLowerCase();
                  if (
                    lower.includes('s3a-r1') &&
                    ['batch-report.json', 'validator-result.json', 'environment-fingerprint.json', 'worker-result.json', 'worker-debug.txt', 'raw-output.txt', 'stderr.txt', 'tool-trace.jsonl', 'wire-trace.jsonl', 'manifest.json'].includes(entry.name)
                  ) {
                    diagnosticFiles.push(full);
                  }
                }
              }
            }

            walk(root);

            const copied = [];
            const copyErrors = [];
            const candidates = [...new Set([...artifactDirs, ...tempDirs])].slice(0, 100);
            for (let index = 0; index < candidates.length; index += 1) {
              const source = candidates[index];
              const destination = path.join(target, `dir-${String(index).padStart(3, '0')}`);
              try {
                fs.cpSync(source, destination, { recursive: true, force: true, errorOnExist: false });
                copied.push({ source, destination });
              } catch (error) {
                copyErrors.push({ source, error: String(error) });
              }
            }

            const fileTarget = path.join(target, 'individual-files');
            fs.mkdirSync(fileTarget, { recursive: true });
            for (let index = 0; index < diagnosticFiles.slice(0, 500).length; index += 1) {
              const source = diagnosticFiles[index];
              const safeName = `${String(index).padStart(4, '0')}-${path.basename(source)}`;
              try {
                fs.copyFileSync(source, path.join(fileTarget, safeName));
              } catch (error) {
                copyErrors.push({ source, error: String(error) });
              }
            }

            const inventory = {
              schema_version: 'bench.hermes-s3a-r1-recovery-v2.v1',
              scanned_root: root,
              target,
              artifact_directories: artifactDirs,
              temporary_directories: tempDirs,
              diagnostic_files: diagnosticFiles,
              copied,
              traversal_errors: errors,
              copy_errors: copyErrors,
            };
            fs.writeFileSync(path.join(target, 'inventory.json'), JSON.stringify(inventory, null, 2) + '\n', 'utf8');

            const { owner, repo } = context.repo;
            const summary = {
              schema_version: inventory.schema_version,
              run_id: context.runId,
              run_attempt: process.env.GITHUB_RUN_ATTEMPT,
              artifact_directory_count: artifactDirs.length,
              temporary_directory_count: tempDirs.length,
              diagnostic_file_count: diagnosticFiles.length,
              copied_directory_count: copied.length,
              traversal_error_count: errors.length,
              copy_error_count: copyErrors.length,
              artifact_directories: artifactDirs.slice(0, 20),
              temporary_directories: tempDirs.slice(0, 20),
              diagnostic_files: diagnosticFiles.slice(0, 50),
            };
            await github.rest.issues.create({
              owner,
              repo,
              title: `BENCH-2R S3A-R1 recovery v2 — ${context.runId}`,
              body: `Read-only full runner-workspace recovery.\n\n\`\`\`json\n${JSON.stringify(summary, null, 2)}\n\`\`\``,
            });
            core.notice(`Recovered ${copied.length} directories and ${diagnosticFiles.length} diagnostic files.`);
      - name: Upload recovered residual evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench2r-hermes-s3a-r1-recovery-v2-${{ github.run_id }}
          path: ${{ runner.temp }}/s3a-r1-recovery-v2/
          if-no-files-found: error
          retention-days: 45
