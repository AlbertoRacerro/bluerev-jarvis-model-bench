name: BENCH-2R Hermes S3A-R1 repair experiment

on:
  push:
    branches: [main]
    paths:
      - config/bench2r-hermes-s3a-r1-repair-marker.json

permissions:
  contents: read

concurrency:
  group: bench2r-hermes-s3a-r1-repair
  cancel-in-progress: true

jobs:
  paired-repair:
    if: startsWith(github.event.head_commit.message, 'Activate BENCH-2R Hermes S3A-R1 repair experiment')
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        batch: [0, 1, 2]
    runs-on: [self-hosted, Windows, X64, bluerev-bench]
    timeout-minutes: 180
    env:
      BENCH2R_HERMES_S3A_R1_BATCH_INDEX: ${{ matrix.batch }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Validate authorized S3A-R1 repair runtime contract
        shell: cmd
        run: python -m scripts.run_bench2r_hermes_s3a_r1_repair_preflight
      - name: Upload S3A-R1 preflight evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench2r-hermes-s3a-r1-preflight-${{ github.run_id }}-${{ github.run_attempt }}-b${{ matrix.batch }}
          path: artifacts/preflight/
          if-no-files-found: error
          retention-days: 21
      - name: Capture paired S3A-R1 batch with Windows keep-awake
        shell: cmd
        run: python -m scripts.run_bench2r_hermes_s3a_r1_repair_awake capture
      - name: Enforce S3A-R1 repair artifact integrity
        if: always()
        shell: cmd
        run: python -m scripts.run_bench2r_hermes_s3a_r1_repair enforce
      - name: Upload S3A-R1 repair evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench2r-hermes-s3a-r1-${{ github.run_id }}-${{ github.run_attempt }}-b${{ matrix.batch }}
          path: artifacts/bench2r-hermes-s3a-r1-repair/
          if-no-files-found: error
          retention-days: 45
