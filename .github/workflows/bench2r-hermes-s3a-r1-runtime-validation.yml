name: BENCH-2R Hermes S3A-R1 runtime validation

on:
  pull_request:
    paths:
      - config/bench2r-hermes-s3a-marker.json
      - config/bench2r-hermes-s3a-r1-repair-marker.json
      - candidates/hermes-orchestrator-admitted-stack.json
      - config/bench2r-hermes-optimization-profiles.json
      - fixtures/bench-2r/hermes-skills/bounded-tool-orchestration/SKILL.md
      - fixtures/bench-2r/hermes-skills/bounded-tool-orchestration-v1.2-candidate/SKILL.md
      - fixtures/bench-2r/s3a-cases/**
      - fixtures/bench-2r/s3a-hermes-plugin/**
      - fixtures/bench-plans/bench2r-hermes-s3a-r1-repair-plan.json
      - fixtures/bench-plans/bench2r-hermes-s3a-r1-repair-runtime-plan.json
      - reports/BENCH-2R-HERMES-S3A-CLOSEOUT/**
      - reports/BENCH-2R-HERMES-S3A-R1-REPAIR-DESIGN/**
      - reports/BENCH-2R-HERMES-S3A-R1-RUNTIME/**
      - scripts/bench2r_deterministic_finalizer.py
      - scripts/bench2r_loopback_wire_proxy.py
      - scripts/bench2r_hermes_runtime.py
      - scripts/run_bench2r_hermes_worker.py
      - scripts/run_bench2r_hermes_s3a.py
      - scripts/run_bench2r_hermes_s3a_safe.py
      - scripts/run_bench2r_hermes_s3a_r1_repair.py
      - scripts/run_bench2r_hermes_s3a_r1_repair_awake.py
      - scripts/run_bench2r_hermes_s3a_r1_repair_preflight.py
      - scripts/validate_bench2r_hermes_s3a_r1_repair.py
      - scripts/validate_bench2r_hermes_s3a_r1_repair_runtime.py
      - tests/test_bench2r_hermes_s3a_closeout.py
      - tests/test_bench2r_hermes_s3a_r1_repair.py
      - tests/test_bench2r_hermes_s3a_r1_repair_runtime.py
      - tests/test_bench2r_hermes_s3a_r1_repair_preflight.py
      - .github/workflows/bench2r-hermes-s3a-r1-repair.yml
      - .github/workflows/bench2r-hermes-s3a-r1-runtime-validation.yml

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate reviewed S3A-R1 workflow with marker disabled
        shell: bash
        run: |
          mkdir -p artifacts
          set -o pipefail
          {
            python -m unittest -v \
              tests.test_bench2r_hermes_s3a_closeout \
              tests.test_bench2r_hermes_s3a_r1_repair_runtime \
              tests.test_bench2r_hermes_s3a_r1_repair_preflight
            python -m scripts.validate_bench2r_hermes_s3a_closeout \
              --output artifacts/bench2r-s3a-closeout-validation.json
            python -m scripts.validate_bench2r_hermes_s3a_r1_repair_runtime \
              --require-disabled \
              --output artifacts/bench2r-s3a-r1-repair-runtime-validation.json
            python -m py_compile \
              scripts/run_bench2r_hermes_s3a_r1_repair.py \
              scripts/run_bench2r_hermes_s3a_r1_repair_awake.py \
              scripts/run_bench2r_hermes_s3a_r1_repair_preflight.py \
              scripts/validate_bench2r_hermes_s3a_r1_repair.py \
              scripts/validate_bench2r_hermes_s3a_r1_repair_runtime.py \
              tests/test_bench2r_hermes_s3a_r1_repair.py \
              tests/test_bench2r_hermes_s3a_r1_repair_runtime.py \
              tests/test_bench2r_hermes_s3a_r1_repair_preflight.py
          } 2>&1 | tee artifacts/validation.log
      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench2r-hermes-s3a-r1-runtime-validation
          path: artifacts/
          if-no-files-found: error
          retention-days: 21
