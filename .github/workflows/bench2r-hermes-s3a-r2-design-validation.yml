name: BENCH-2R Hermes S3A-R2 design validation

on:
  pull_request:
    paths:
      - .github/workflows/bench2r-hermes-s3a-r2-design-validation.yml
      - .github/workflows/bench2r-hermes-s3a-r2-canary.yml
      - config/bench2r-hermes-s3a-marker.json
      - config/bench2r-hermes-s3a-r1-repair-marker.json
      - config/bench2r-hermes-s3a-r2-marker.json
      - fixtures/bench-2r/hermes-skills/bounded-tool-orchestration-v1.2-candidate/SKILL.md
      - fixtures/bench-2r/hermes-skills/bounded-tool-orchestration-v1.3-candidate/SKILL.md
      - fixtures/bench-plans/bench2r-hermes-s3a-r2-design.json
      - reports/BENCH-2R-HERMES-S3A-RUNNER-AUDIT/**
      - scripts/validate_bench2r_hermes_s3a_r2_design.py
      - tests/test_bench2r_hermes_s3a_r2_design.py
  push:
    branches: [main]
    paths:
      - .github/workflows/bench2r-hermes-s3a-r2-design-validation.yml
      - .github/workflows/bench2r-hermes-s3a-r2-canary.yml
      - config/bench2r-hermes-s3a-marker.json
      - config/bench2r-hermes-s3a-r1-repair-marker.json
      - config/bench2r-hermes-s3a-r2-marker.json
      - fixtures/bench-2r/hermes-skills/bounded-tool-orchestration-v1.2-candidate/SKILL.md
      - fixtures/bench-2r/hermes-skills/bounded-tool-orchestration-v1.3-candidate/SKILL.md
      - fixtures/bench-plans/bench2r-hermes-s3a-r2-design.json
      - reports/BENCH-2R-HERMES-S3A-RUNNER-AUDIT/**
      - scripts/validate_bench2r_hermes_s3a_r2_design.py
      - tests/test_bench2r_hermes_s3a_r2_design.py

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate non-executive S3A-R2 design
        run: python -m scripts.validate_bench2r_hermes_s3a_r2_design --output artifacts/validation/s3a-r2-design.json
      - name: Run S3A-R2 regression tests
        run: python -m unittest tests/test_bench2r_hermes_s3a_r2_design.py -v
      - name: Assert no execution boundary exists
        shell: bash
        run: |
          test ! -e .github/workflows/bench2r-hermes-s3a-r2-canary.yml
          test ! -e config/bench2r-hermes-s3a-r2-marker.json
          python - <<'PY'
          import json
          from pathlib import Path

          plan = json.loads(Path('fixtures/bench-plans/bench2r-hermes-s3a-r2-design.json').read_text(encoding='utf-8'))
          execution = plan['execution']
          assert execution['implemented'] is False
          assert execution['execution_workflow_present'] is False
          assert execution['marker_present'] is False
          assert execution['ollama_calls_allowed_in_this_slice'] is False
          assert execution['self_hosted_compute_allowed_in_this_slice'] is False
          PY
      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench2r-hermes-s3a-r2-design-${{ github.run_id }}
          path: artifacts/validation/
          if-no-files-found: error
          retention-days: 21
