name: BENCH-2R Hermes S3A validation

on:
  pull_request:
    paths:
      - candidates/hermes-orchestrator-admitted-stack.json
      - config/bench2r-hermes-s3a-marker.json
      - fixtures/bench-2r/s3a-cases/**
      - fixtures/bench-2r/s3a-hermes-plugin/**
      - fixtures/bench-plans/bench2r-hermes-s3a-shadow-soak-plan.json
      - fixtures/bench-plans/bench2r-hermes-s3a-runtime-plan.json
      - reports/BENCH-2R-HERMES-S2-CLOSEOUT/**
      - reports/BENCH-2R-HERMES-S3A-DESIGN/**
      - reports/BENCH-2R-HERMES-S3A-WINDOWS-SOURCE-FIX/**
      - scripts/bench2r_deterministic_finalizer.py
      - scripts/bench2r_loopback_wire_proxy.py
      - scripts/run_bench2r_hermes_worker.py
      - scripts/run_bench2r_hermes_s3a.py
      - scripts/run_bench2r_hermes_s3a_safe.py
      - scripts/run_bench2r_hermes_s3a_awake.py
      - scripts/run_bench2r_hermes_s3a_preflight.py
      - scripts/validate_bench2r_hermes_s3a.py
      - scripts/validate_bench2r_hermes_s3a_contract.py
      - scripts/validate_bench2r_hermes_s3a_runtime.py
      - scripts/validate_bench2r_hermes_s3a_windows.py
      - tests/test_bench2r_hermes_s3a.py
      - tests/test_bench2r_hermes_s3a_contract.py
      - tests/test_bench2r_hermes_s3a_runtime.py
      - tests/test_bench2r_hermes_s3a_windows.py
      - tests/test_bench2r_hermes_s3a_preflight.py
      - .github/workflows/bench2r-hermes-s3a-oneshot.yml
      - .github/workflows/bench2r-hermes-s3a-validation.yml

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate S3A durable preflight and Windows boundary
        shell: bash
        run: |
          mkdir -p artifacts
          set -o pipefail
          {
            python -m unittest -v \
              tests.test_bench2r_hermes_s3a \
              tests.test_bench2r_hermes_s3a_contract \
              tests.test_bench2r_hermes_s3a_windows \
              tests.test_bench2r_hermes_s3a_preflight
            python -m scripts.validate_bench2r_hermes_s3a_windows \
              --output artifacts/bench2r-s3a-windows-disabled-validation.json
            python -m py_compile \
              scripts/run_bench2r_hermes_s3a.py \
              scripts/run_bench2r_hermes_s3a_safe.py \
              scripts/run_bench2r_hermes_s3a_awake.py \
              scripts/run_bench2r_hermes_s3a_preflight.py \
              scripts/validate_bench2r_hermes_s3a.py \
              scripts/validate_bench2r_hermes_s3a_contract.py \
              scripts/validate_bench2r_hermes_s3a_runtime.py \
              scripts/validate_bench2r_hermes_s3a_windows.py \
              tests/test_bench2r_hermes_s3a.py \
              tests/test_bench2r_hermes_s3a_contract.py \
              tests/test_bench2r_hermes_s3a_runtime.py \
              tests/test_bench2r_hermes_s3a_windows.py \
              tests/test_bench2r_hermes_s3a_preflight.py
          } 2>&1 | tee artifacts/validation.log
      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench2r-hermes-s3a-validation
          path: artifacts/
          if-no-files-found: error
          retention-days: 21
