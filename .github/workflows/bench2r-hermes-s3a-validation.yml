name: BENCH-2R Hermes S3A design validation

on:
  pull_request:
    paths:
      - candidates/hermes-orchestrator-admitted-stack.json
      - config/bench2r-hermes-s3a-marker.json
      - fixtures/bench-2r/s3a-cases/**
      - fixtures/bench-plans/bench2r-hermes-s3a-shadow-soak-plan.json
      - reports/BENCH-2R-HERMES-S2-CLOSEOUT/**
      - reports/BENCH-2R-HERMES-S3A-DESIGN/**
      - scripts/bench2r_deterministic_finalizer.py
      - scripts/validate_bench2r_hermes_s3a.py
      - tests/test_bench2r_hermes_s3a.py
      - .github/workflows/bench2r-hermes-s3a-validation.yml

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate S3A design-only boundary
        run: |
          mkdir -p artifacts
          python -m unittest -v tests.test_bench2r_hermes_s3a
          python -m scripts.validate_bench2r_hermes_s3a --output artifacts/bench2r-s3a-design-validation.json
          python -m py_compile scripts/validate_bench2r_hermes_s3a.py tests/test_bench2r_hermes_s3a.py
      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench2r-hermes-s3a-design-validation
          path: artifacts/
          if-no-files-found: error
          retention-days: 21
