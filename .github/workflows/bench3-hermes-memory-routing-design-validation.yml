name: BENCH-3 Hermes memory-routing design validation

on:
  pull_request:
    paths:
      - .github/workflows/bench3-hermes-memory-routing-design-validation.yml
      - .github/workflows/bench3-hermes-memory-routing-canary.yml
      - .github/actions/**
      - config/bench3-hermes-memory-routing-marker.json
      - docs/research/HERMES_LOCAL_RELIABILITY_MEMORY_ROUTING.md
      - fixtures/bench-3/hermes-memory-routing-case-contracts.json
      - fixtures/bench-3/hermes-skills/memory-orchestration-v0.1/SKILL.md
      - fixtures/bench-3/hermes-skills/routing-orchestration-v0.1/SKILL.md
      - fixtures/bench-3/hermes-skill-bundles/jarvis-orchestration-core.yaml
      - fixtures/bench-plans/bench3-hermes-memory-routing-design.json
      - scripts/run_bench3_hermes_memory_routing.py
      - scripts/run_bench3_hermes_memory_routing.ps1
      - scripts/run_bench3_hermes_memory_routing.cmd
      - scripts/run_bench3_hermes_memory_routing.bat
      - scripts/run_bench3_hermes_memory_routing.sh
      - .github/workflows/*bench*3**
      - config/*bench*3**
      - scripts/*bench*3**
      - tests/test_bench3_hermes_memory_routing_design.py
      - tests/test_bench3_case_contracts.py
      - tests/test_bench3_workflow_guards.py
      - tests/test_bench3_shell_runtime_guard.py
      - tests/test_bench3_action_namespace.py
      - tests/test_bench3_static_contract.py
  push:
    branches: [main]
    paths:
      - .github/workflows/bench3-hermes-memory-routing-design-validation.yml
      - .github/workflows/bench3-hermes-memory-routing-canary.yml
      - .github/actions/**
      - config/bench3-hermes-memory-routing-marker.json
      - docs/research/HERMES_LOCAL_RELIABILITY_MEMORY_ROUTING.md
      - fixtures/bench-3/hermes-memory-routing-case-contracts.json
      - fixtures/bench-3/hermes-skills/memory-orchestration-v0.1/SKILL.md
      - fixtures/bench-3/hermes-skills/routing-orchestration-v0.1/SKILL.md
      - fixtures/bench-3/hermes-skill-bundles/jarvis-orchestration-core.yaml
      - fixtures/bench-plans/bench3-hermes-memory-routing-design.json
      - scripts/run_bench3_hermes_memory_routing.py
      - scripts/run_bench3_hermes_memory_routing.ps1
      - scripts/run_bench3_hermes_memory_routing.cmd
      - scripts/run_bench3_hermes_memory_routing.bat
      - scripts/run_bench3_hermes_memory_routing.sh
      - .github/workflows/*bench*3**
      - config/*bench*3**
      - scripts/*bench*3**
      - tests/test_bench3_hermes_memory_routing_design.py
      - tests/test_bench3_case_contracts.py
      - tests/test_bench3_workflow_guards.py
      - tests/test_bench3_shell_runtime_guard.py
      - tests/test_bench3_action_namespace.py
      - tests/test_bench3_static_contract.py

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate complete non-executive BENCH-3 contract
        run: python -m scripts.validate_bench3_static_contract --output artifacts/validation/bench3-memory-routing-design.json
      - name: Run memory-routing regression tests
        run: python -m unittest tests/test_bench3_hermes_memory_routing_design.py tests/test_bench3_case_contracts.py tests/test_bench3_workflow_guards.py tests/test_bench3_shell_runtime_guard.py tests/test_bench3_action_namespace.py tests/test_bench3_static_contract.py -v
      - name: Assert no runtime boundary exists
        shell: bash
        run: |
          test ! -e .github/workflows/bench3-hermes-memory-routing-canary.yml
          test ! -e config/bench3-hermes-memory-routing-marker.json
          test ! -e scripts/run_bench3_hermes_memory_routing.py
          test ! -e scripts/run_bench3_hermes_memory_routing.ps1
          test ! -e scripts/run_bench3_hermes_memory_routing.cmd
          test ! -e scripts/run_bench3_hermes_memory_routing.bat
          test ! -e scripts/run_bench3_hermes_memory_routing.sh
          python - <<'PY'
          import json
          from pathlib import Path
          plan = json.loads(Path('fixtures/bench-plans/bench3-hermes-memory-routing-design.json').read_text(encoding='utf-8'))
          execution = plan['execution']
          assert execution['implemented'] is False
          assert execution['workflow_present'] is False
          assert execution['marker_present'] is False
          assert execution['ollama_calls_allowed_in_this_slice'] is False
          assert execution['self_hosted_compute_allowed_in_this_slice'] is False
          assert execution['jarvis_routing_changes_allowed_in_this_slice'] is False
          assert execution['memory_mutation_allowed_in_this_slice'] is False
          assert execution['runtime_namespace_guard_required'] is True
          PY
      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench3-hermes-memory-routing-design-${{ github.run_id }}
          path: artifacts/validation/
          if-no-files-found: error
          retention-days: 21
