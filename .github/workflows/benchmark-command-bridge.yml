name: Benchmark command bridge

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  actions: write
  issues: write

jobs:
  dispatch:
    if: >-
      github.repository == 'AlbertoRacerro/bluerev-jarvis-model-bench' &&
      github.event.issue.number == 24
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Authorize and dispatch trusted-main workflow
        uses: actions/github-script@v7
        with:
          script: |
            const command = context.payload.comment.body;
            const workflows = Object.freeze({
              '/bench preflight': 'local-benchmark.yml',
              '/bench residency': 'local-model-residency.yml',
              '/bench direct-smoke': 'local-direct-smoke.yml',
            });
            const authorized =
              context.repo.owner === 'AlbertoRacerro' &&
              context.repo.repo === 'bluerev-jarvis-model-bench' &&
              context.payload.issue.number === 24 &&
              !context.payload.issue.pull_request &&
              context.payload.comment.user.login === 'AlbertoRacerro' &&
              Number(context.payload.comment.user.id) === 293122393 &&
              context.payload.comment.user.type === 'User' &&
              context.payload.comment.author_association === 'OWNER';
            if (!authorized) {
              core.info('ignored unauthorized benchmark command comment');
              return;
            }
            const workflowId = workflows[command];
            if (!workflowId) {
              core.info(`ignored unsupported benchmark command: ${JSON.stringify(command)}`);
              return;
            }
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowId,
              ref: 'main',
            });
            const receipt = {
              schema_version: 'bench.command-receipt.v1',
              command,
              target_workflow: workflowId,
              ref: 'main',
              source_comment_id: context.payload.comment.id,
              requested_by: context.payload.comment.user.login,
            };
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 24,
              body: `<!-- bench-command-receipt-v1 -->\n\`\`\`json\n${JSON.stringify(receipt, null, 2)}\n\`\`\``,
            });
