name: Trusted-main deterministic CI

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  tests:
    if: github.ref == 'refs/heads/main'
    concurrency:
      group: local-benchmark-runner
      cancel-in-progress: false
      queue: max
    runs-on: [self-hosted, Windows, X64, bluerev-bench]
    timeout-minutes: 20
    defaults:
      run:
        shell: powershell

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false
          clean: true

      - name: Capture compile and deterministic tests
        id: capture
        run: |
          $env:PYTHONUTF8 = '1'
          $env:PYTHONIOENCODING = 'utf-8'
          $launcherDir = Join-Path $env:RUNNER_TEMP "bluerev-deterministic-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT"
          if (Test-Path $launcherDir) { Remove-Item -Recurse -Force $launcherDir }
          New-Item -ItemType Directory -Force -Path $launcherDir | Out-Null
          $stdoutPath = Join-Path $launcherDir 'launcher.stdout.log'
          $stderrPath = Join-Path $launcherDir 'launcher.stderr.log'
          $errorPath = Join-Path $launcherDir 'launcher.powershell-error.log'
          $captureExit = 127
          try {
            $pythonCommand = Get-Command python -ErrorAction Stop
            $process = Start-Process `
              -FilePath $pythonCommand.Source `
              -ArgumentList @('-m', 'scripts.run_deterministic_ci', 'capture') `
              -WorkingDirectory $PWD `
              -NoNewWindow `
              -Wait `
              -PassThru `
              -RedirectStandardOutput $stdoutPath `
              -RedirectStandardError $stderrPath
            $captureExit = $process.ExitCode
          } catch {
            $_ | Out-String | Set-Content -Path $errorPath -Encoding utf8
          }
          $artifactDir = Join-Path $PWD 'artifacts\deterministic-ci'
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
          Set-Content -Path (Join-Path $artifactDir 'launcher.exit') -Value $captureExit -Encoding ascii
          foreach ($path in @($stdoutPath, $stderrPath, $errorPath)) {
            if (Test-Path $path) { Copy-Item -Force $path $artifactDir }
          }
          if (Test-Path $stdoutPath) { Get-Content $stdoutPath | ForEach-Object { Write-Host $_ } }
          if (Test-Path $stderrPath) { Get-Content $stderrPath | ForEach-Object { Write-Host $_ } }
          if (Test-Path $errorPath) { Get-Content $errorPath | ForEach-Object { Write-Host $_ } }
          if ($captureExit -ne 0) { exit $captureExit }

      - name: Upload deterministic evidence
        id: upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deterministic-ci-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/deterministic-ci/
          if-no-files-found: error
          retention-days: 14

      - name: Enforce deterministic gate
        id: enforce
        if: always()
        run: python -m scripts.run_deterministic_ci enforce

      - name: Publish deterministic status
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          INBOX_ISSUE: "24"
          STATUS_ISSUE: "49"
          SUMMARY_PATH: artifacts/deterministic-ci/summary.json
          LAUNCHER_EXIT_PATH: artifacts/deterministic-ci/launcher.exit
          JOB_STATUS: ${{ job.status }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          CAPTURE_OUTCOME: ${{ steps.capture.outcome }}
          ENFORCE_OUTCOME: ${{ steps.enforce.outcome }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          ARTIFACT_DIGEST: ${{ steps.upload.outputs.artifact-digest }}
        with:
          script: |
            const fs = require('fs');
            const updateLatestStatus = require('./.github/scripts/update_latest_status.js');
            let summary = null;
            let summaryError = null;
            let launcherExit = null;
            try { summary = JSON.parse(fs.readFileSync(process.env.SUMMARY_PATH, 'utf8')); }
            catch (error) { summaryError = `${error.name}: ${error.message}`; }
            try { launcherExit = Number(fs.readFileSync(process.env.LAUNCHER_EXIT_PATH, 'utf8').trim()); }
            catch (_) { launcherExit = null; }
            const payload = {
              schema_version: 'bench.deterministic-ci-inbox.v3',
              run_id: Number(context.runId),
              run_attempt: Number(process.env.RUN_ATTEMPT),
              workflow: context.workflow,
              event_name: context.eventName,
              sha: context.sha,
              ref: context.ref,
              job_status: process.env.JOB_STATUS,
              phases: {
                capture: process.env.CAPTURE_OUTCOME,
                enforce: process.env.ENFORCE_OUTCOME,
              },
              launcher_exit: launcherExit,
              artifact: {
                url: process.env.ARTIFACT_URL || null,
                digest: process.env.ARTIFACT_DIGEST || null,
              },
              capture_error: summary?.capture_error ?? null,
              compileall: summary?.compileall ?? null,
              tests: summary?.tests ?? null,
              sanitization: summary?.sanitization ?? null,
              summary_error: summaryError,
            };
            await updateLatestStatus({
              github,
              context,
              issueNumber: Number(process.env.STATUS_ISSUE),
              section: 'deterministic',
              title: 'Deterministic CI',
              payload,
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.INBOX_ISSUE),
              body: `<!-- bench-deterministic-ci-v3 -->\n\`\`\`json\n${JSON.stringify(payload, null, 2)}\n\`\`\``,
            });
