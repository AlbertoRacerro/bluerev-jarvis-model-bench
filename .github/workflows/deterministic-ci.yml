name: Deterministic benchmark CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  hosted-runner-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Confirm GitHub-hosted runner allocation
        run: echo "github-hosted-runner-started"

  tests:
    needs: hosted-runner-probe
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          clean: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package without optional runtime integrations
        run: python -m pip install -e .
      - name: Compile Python sources
        run: python -m compileall -q src scripts tests
      - name: Run deterministic tests
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: utf-8
        run: python -m unittest discover -s tests -v
