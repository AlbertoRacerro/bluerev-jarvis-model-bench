name: Diagnose final BENCH-2 full-matrix validation

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/diagnose-full-matrix-validation-final.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Capture exact commands and source hashes
        shell: bash
        run: |
          set +e
          mkdir -p artifacts
          {
            echo '=== HASHES ==='
            sha256sum scripts/run_bench2_hermes_batch.py scripts/validate_bench2_hermes_execution.py .github/workflows/bench2-hermes-full-matrix-oneshot.yml
            echo '=== TESTS ==='
            python -m unittest -v tests.test_bench2_hermes_plan tests.test_bench2_hermes_canary_closeout tests.test_bench2_hermes_execution
            echo "tests_exit=$?"
            echo '=== PLAN ==='
            python scripts/validate_bench2_hermes_plan.py --output artifacts/bench2-plan-validation.json
            echo "plan_exit=$?"
            echo '=== CLOSEOUT ==='
            python scripts/validate_bench2_hermes_canary_closeout.py --output artifacts/bench2-canary-closeout-validation.json
            echo "closeout_exit=$?"
            echo '=== EXECUTION ==='
            python scripts/validate_bench2_hermes_execution.py --output artifacts/bench2-full-matrix-validation.json
            echo "execution_exit=$?"
            echo '=== COMPILE ==='
            python -m py_compile scripts/run_bench2_hermes_batch.py
            echo "compile_exit=$?"
          } > artifacts/full-matrix-final-diagnostics.log 2>&1
          cat artifacts/full-matrix-final-diagnostics.log
          exit 0
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: full-matrix-final-diagnostics
          path: artifacts/
          if-no-files-found: error
          retention-days: 3
