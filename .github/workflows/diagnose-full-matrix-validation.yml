name: Diagnose BENCH-2 full-matrix validation

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/diagnose-full-matrix-validation.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run exact validation with captured output
        shell: bash
        run: |
          set +e
          {
            python -m unittest tests.test_bench2_hermes_plan tests.test_bench2_hermes_canary_closeout tests.test_bench2_hermes_execution
            python scripts/validate_bench2_hermes_plan.py --output artifacts/bench2-plan-validation.json
            python scripts/validate_bench2_hermes_canary_closeout.py --output artifacts/bench2-canary-closeout-validation.json
            python scripts/validate_bench2_hermes_execution.py --output artifacts/bench2-full-matrix-validation.json
            python -m py_compile scripts/run_bench2_hermes_batch.py
          } > /tmp/full-matrix-validation.log 2>&1
          code=$?
          cat /tmp/full-matrix-validation.log
          echo "$code" > /tmp/full-matrix-validation-exit-code.txt
          exit 0
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: full-matrix-validation-diagnostics
          path: |
            /tmp/full-matrix-validation.log
            /tmp/full-matrix-validation-exit-code.txt
            artifacts/
          if-no-files-found: error
          retention-days: 3
