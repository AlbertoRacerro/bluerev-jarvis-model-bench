name: Fix BENCH-2 full-matrix indentation v2

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/fix-full-matrix-indentation-v2.yml

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'bench/implement-hermes-full-matrix-runtime' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bench/implement-hermes-full-matrix-runtime
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply deterministic line-based fixes
        id: patch
        shell: bash
        run: |
          set +e
          {
            python - <<'PY'
          from pathlib import Path
          import hashlib
          import re

          runner_path = Path('scripts/run_bench2_hermes_batch.py')
          test_path = Path('tests/test_bench2_hermes_execution.py')

          runner_lines = runner_path.read_text(encoding='utf-8').splitlines()
          in_manifest = False
          fixed_runner = 0
          for index, line in enumerate(runner_lines):
              if line.startswith('def _verify_run_manifest('):
                  in_manifest = True
              elif in_manifest and line.startswith('def _verify_result_artifacts('):
                  in_manifest = False
              if in_manifest and line.startswith('  raise HermesBatchError('):
                  runner_lines[index] = '            ' + line.strip()
                  fixed_runner += 1
          if fixed_runner != 3:
              raise SystemExit(f'expected 3 runner indentation fixes, got {fixed_runner}')
          runner_path.write_text('\n'.join(runner_lines) + '\n', encoding='utf-8', newline='\n')

          test_lines = test_path.read_text(encoding='utf-8').splitlines()
          in_budget_test = False
          in_hash_test = False
          in_call = False
          fixed_test = 0
          for index, line in enumerate(test_lines):
              stripped = line.strip()
              if line.startswith('    def test_stop_case_rejects_two_model_calls_as_semantic_failure'):
                  in_budget_test = True
                  in_hash_test = False
              elif line.startswith('    def test_candidate_setup_and_alias_cleanup_are_failure_isolated'):
                  in_budget_test = False
              elif line.startswith('    def test_full_matrix_reviewed_sources_match_hashes'):
                  in_hash_test = True
                  in_budget_test = False
              elif in_hash_test and line.startswith('    def '):
                  in_hash_test = False

              if in_budget_test and stripped == 'result = runner._semantic_validator(':
                  in_call = True
                  continue
              if in_call:
                  if stripped == ')':
                      in_call = False
                      continue
                  if line.startswith('  ' ) and not line.startswith('            '):
                      test_lines[index] = '            ' + stripped
                      fixed_test += 1
              if in_hash_test:
                  if stripped.startswith('"scripts/') or stripped.startswith('".github/'):
                      test_lines[index] = '            ' + stripped
                      fixed_test += 1
                  elif stripped.startswith('observed = ') or stripped.startswith('self.assertEqual('):
                      test_lines[index] = '            ' + stripped
                      fixed_test += 1
          if fixed_test < 10:
              raise SystemExit(f'expected at least 10 test indentation fixes, got {fixed_test}')

          runner_hash = hashlib.sha256(runner_path.read_bytes()).hexdigest()
          tests = '\n'.join(test_lines) + '\n'
          tests, count = re.subn(
              r'("scripts/run_bench2_hermes_batch\.py": ")[0-9a-f]{64}("[,])',
              rf'\g<1>{runner_hash}\g<2>',
              tests,
              count=1,
          )
          if count != 1:
              raise SystemExit('runner hash replacement failed')
          test_path.write_text(tests, encoding='utf-8', newline='\n')
          PY
            python -m py_compile scripts/run_bench2_hermes_batch.py scripts/validate_bench2_hermes_execution.py
            python -m unittest tests.test_bench2_hermes_plan tests.test_bench2_hermes_canary_closeout tests.test_bench2_hermes_execution
            python scripts/validate_bench2_hermes_execution.py --output artifacts/bench2-full-matrix-validation.json
          } > /tmp/full-matrix-indent-v2.log 2>&1
          code=$?
          cat /tmp/full-matrix-indent-v2.log
          if [ "$code" -eq 0 ]; then
            rm -f .github/workflows/diagnose-full-matrix-validation.yml
            rm -f .github/workflows/fix-full-matrix-indentation.yml
            rm -f .github/workflows/fix-full-matrix-indentation-v2.yml
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add scripts/run_bench2_hermes_batch.py tests/test_bench2_hermes_execution.py .github/workflows/diagnose-full-matrix-validation.yml .github/workflows/fix-full-matrix-indentation.yml .github/workflows/fix-full-matrix-indentation-v2.yml
            git commit -m 'Fix full-matrix evidence indentation'
            git push origin HEAD:bench/implement-hermes-full-matrix-runtime
          fi
          exit $code
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-matrix-indent-v2-diagnostics
          path: |
            /tmp/full-matrix-indent-v2.log
            artifacts/
          if-no-files-found: error
          retention-days: 3
