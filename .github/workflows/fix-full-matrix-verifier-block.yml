name: Fix BENCH-2 verifier block

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/fix-full-matrix-verifier-block.yml

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'bench/implement-hermes-full-matrix-runtime' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bench/implement-hermes-full-matrix-runtime
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fix complete verifier block and verify
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib
          import re

          runner_path = Path('scripts/run_bench2_hermes_batch.py')
          test_path = Path('tests/test_bench2_hermes_execution.py')
          lines = runner_path.read_text(encoding='utf-8').splitlines()
          start = next(i for i, line in enumerate(lines) if line.startswith('def _verify_result_artifacts('))
          end = next(i for i, line in enumerate(lines[start + 1:], start + 1) if line.startswith('def enforce('))
          fixed = 0
          for i in range(start, end):
              if lines[i].startswith('  raise HermesBatchError('):
                  lines[i] = '            ' + lines[i].strip()
                  fixed += 1
          if fixed != 10:
              raise SystemExit(f'expected 10 verifier raise fixes, got {fixed}')
          runner_path.write_text('\n'.join(lines) + '\n', encoding='utf-8', newline='\n')

          runner_hash = hashlib.sha256(runner_path.read_bytes()).hexdigest()
          tests = test_path.read_text(encoding='utf-8')
          tests, count = re.subn(
              r'("scripts/run_bench2_hermes_batch\.py": ")[0-9a-f]{64}("[,])',
              rf'\g<1>{runner_hash}\g<2>',
              tests,
              count=1,
          )
          if count != 1:
              raise SystemExit('runner hash replacement failed')
          test_path.write_text(tests, encoding='utf-8', newline='\n')
          PY
          python -m py_compile scripts/run_bench2_hermes_batch.py scripts/validate_bench2_hermes_execution.py
          python -m unittest tests.test_bench2_hermes_plan tests.test_bench2_hermes_canary_closeout tests.test_bench2_hermes_execution
          python scripts/validate_bench2_hermes_execution.py --output artifacts/bench2-full-matrix-validation.json
          rm .github/workflows/diagnose-full-matrix-validation-final.yml .github/workflows/fix-full-matrix-verifier-block.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/run_bench2_hermes_batch.py tests/test_bench2_hermes_execution.py .github/workflows/diagnose-full-matrix-validation-final.yml .github/workflows/fix-full-matrix-verifier-block.yml
          git commit -m 'Fix full-matrix verifier block indentation'
          git push origin HEAD:bench/implement-hermes-full-matrix-runtime
