name: H3 branch validation

on:
  push:
    branches: [bench/h3-primary-32k]

permissions:
  contents: read
  issues: write
  statuses: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          clean: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile remote H3 blobs
        id: compile
        run: |
          python -m py_compile \
            scripts/probe_h3_context.py \
            scripts/run_h3_context_job.py \
            scripts/run_h3_context_bound_job.py \
            scripts/run_direct_smoke_v3_job.py \
            scripts/run_direct_smoke_v3_job_base.py \
            tests/test_probe_h3_context.py \
            tests/test_run_h3_context_job.py \
            tests/test_h3_oneshot_bridge.py
      - name: Run focused remote tests
        id: tests
        run: |
          python -m unittest -v \
            tests.test_probe_h3_context \
            tests.test_run_h3_context_job \
            tests.test_h3_oneshot_bridge \
            tests.test_run_direct_smoke_v3_job
      - name: Publish validation evidence
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          ISSUE: "24"
          COMPILE: ${{ steps.compile.outcome }}
          TESTS: ${{ steps.tests.outcome }}
          STATUS: ${{ job.status }}
        with:
          script: |
            const success = process.env.COMPILE === 'success' && process.env.TESTS === 'success';
            const payload = {
              schema_version: 'bench.h3-branch-validation.v1',
              run_id: Number(context.runId), sha: context.sha, ref: context.ref,
              job_status: process.env.STATUS,
              compile: process.env.COMPILE, tests: process.env.TESTS,
            };
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner, repo: context.repo.repo, sha: context.sha,
              state: success ? 'success' : 'failure',
              context: 'h3-branch-validation',
              description: success ? 'Remote H3 compile and focused tests passed' : 'Remote H3 validation failed',
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE),
              body: '<!-- bench-h3-branch-validation-v1 -->\n```json\n' + JSON.stringify(payload, null, 2) + '\n```',
            });
