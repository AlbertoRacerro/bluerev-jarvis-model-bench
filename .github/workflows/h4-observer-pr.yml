name: H4 observer snapshot

on:
  pull_request:
    paths:
      - .github/workflows/h4-observer-pr.yml

permissions:
  contents: read
  actions: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Capture H4 activation run snapshot
        uses: actions/github-script@v7
        env:
          ACTIVATION_SHA: a2926cc93abb1a64874352c4508e8c97b0b6007f
          WORKFLOW_NAME: H4 one-shot 64K qualification bridge
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner, repo, event: 'push', head_sha: process.env.ACTIVATION_SHA, per_page: 100
            });
            const matches = runs.filter(r => r.name === process.env.WORKFLOW_NAME);
            if (matches.length !== 1) {
              core.setFailed(`Expected exactly one H4 activation run, found ${matches.length}`);
            }
            const run = matches[0] || null;
            let jobs = [];
            let artifacts = [];
            if (run) {
              jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
                owner, repo, run_id: run.id, filter: 'latest', per_page: 100
              });
              artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
                owner, repo, run_id: run.id, per_page: 100
              });
            }
            const compact = {
              schema_version: 'bench.h4-observer.v1',
              captured_at: new Date().toISOString(),
              activation_sha: process.env.ACTIVATION_SHA,
              run: run && {
                id: run.id,
                run_attempt: run.run_attempt,
                status: run.status,
                conclusion: run.conclusion,
                event: run.event,
                head_sha: run.head_sha,
                path: run.path,
                html_url: run.html_url,
                created_at: run.created_at,
                updated_at: run.updated_at
              },
              jobs: jobs.map(j => ({
                id: j.id,
                name: j.name,
                status: j.status,
                conclusion: j.conclusion,
                started_at: j.started_at,
                completed_at: j.completed_at,
                runner_name: j.runner_name,
                runner_group_name: j.runner_group_name,
                html_url: j.html_url,
                steps: (j.steps || []).map(s => ({name: s.name, status: s.status, conclusion: s.conclusion, number: s.number}))
              })),
              artifacts: artifacts.map(a => ({
                id: a.id,
                name: a.name,
                size_in_bytes: a.size_in_bytes,
                digest: a.digest,
                expired: a.expired,
                created_at: a.created_at,
                expires_at: a.expires_at,
                archive_download_url: a.archive_download_url
              }))
            };
            fs.writeFileSync('h4-observer.json', JSON.stringify(compact, null, 2) + '\n');
            core.info(JSON.stringify(compact));
      - name: Download and summarize H4 job logs
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p h4-job-logs
          jq -r '.jobs[].id' h4-observer.json | while read -r job_id; do
            curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${job_id}/logs" \
              -o "h4-job-logs/${job_id}.log"
          done
          python - <<'PY'
          import json, pathlib, re
          root = pathlib.Path('h4-job-logs')
          out = {'schema_version': 'bench.h4-log-diagnostics.v1', 'jobs': []}
          pattern = re.compile(r'(error|traceback|exception|failed|failure|no files were found|missing h4)', re.I)
          for path in sorted(root.glob('*.log')):
              text = path.read_text(encoding='utf-8-sig', errors='replace')
              lines = text.splitlines()
              matched = [line for line in lines if pattern.search(line)]
              out['jobs'].append({
                  'job_id': int(path.stem),
                  'line_count': len(lines),
                  'matched_lines': matched[-60:],
                  'tail': lines[-100:],
              })
          pathlib.Path('h4-log-diagnostics.json').write_text(json.dumps(out, indent=2) + '\n', encoding='utf-8')
          PY
      - name: Upload observer snapshot and diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: h4-observer-snapshot
          path: |
            h4-observer.json
            h4-log-diagnostics.json
            h4-job-logs/
          if-no-files-found: error
          retention-days: 7
