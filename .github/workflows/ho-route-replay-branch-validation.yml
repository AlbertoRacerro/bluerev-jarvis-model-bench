name: Temporary benchmark plan branch validation

on:
  push:
    branches:
      - bench/ho-route-explicit-replay
      - plan/bench2-hermes-orchestrator-isolation

permissions:
  contents: read
  issues: write
  statuses: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          clean: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile plan validators
        id: compile
        run: |
          set -o pipefail
          python -m py_compile \
            scripts/validate_bench2_plan.py \
            tests/test_bench2_hermes_plan.py \
            scripts/probe_ho_route_explicit_replay.py \
            scripts/run_ho_route_explicit_replay_job.py \
            scripts/run_ho_route_explicit_replay_bound_job.py \
            scripts/run_ho_route_explicit_replay_capture_entry.py \
            scripts/run_ho_route_explicit_replay_enforce_entry.py \
            tests/test_ho_route_explicit_replay.py 2>&1 | tee compile.log
      - name: Run unchanged deterministic contracts
        id: base_tests
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          set -o pipefail
          python -m unittest -v \
            tests.test_direct_execution_v3 \
            tests.test_evaluator \
            tests.test_cases \
            tests.test_contracts 2>&1 | tee base-tests.log
      - name: Run replay and BENCH-2 plan tests in isolated processes
        id: plan_tests
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          set -o pipefail
          python -m unittest -v tests.test_ho_route_explicit_replay 2>&1 | tee replay-tests.log
          python -m unittest -v tests.test_bench2_hermes_plan 2>&1 | tee plan-tests.log
          python scripts/validate_bench2_plan.py 2>&1 | tee plan-validator.log
      - name: Publish validation evidence
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          DIAGNOSTIC_ISSUE: "81"
          COMPILE: ${{ steps.compile.outcome }}
          BASE_TESTS: ${{ steps.base_tests.outcome }}
          PLAN_TESTS: ${{ steps.plan_tests.outcome }}
        with:
          script: |
            const fs = require('fs');
            const tail = (path) => { try { return fs.readFileSync(path, 'utf8').slice(-20000); } catch (_) { return null; } };
            const success = [process.env.COMPILE, process.env.BASE_TESTS, process.env.PLAN_TESTS].every(v => v === 'success');
            const payload = {
              schema_version: 'bench.plan-branch-validation.v1',
              run_id: Number(context.runId),
              sha: context.sha,
              ref: context.ref,
              compile: process.env.COMPILE,
              base_tests: process.env.BASE_TESTS,
              plan_tests: process.env.PLAN_TESTS,
              compile_log_tail: tail('compile.log'),
              base_test_log_tail: tail('base-tests.log'),
              replay_test_log_tail: tail('replay-tests.log'),
              plan_test_log_tail: tail('plan-tests.log'),
              plan_validator_log_tail: tail('plan-validator.log'),
            };
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: success ? 'success' : 'failure',
              context: 'bench2-plan-contract',
              description: success ? 'BENCH-2 plan contract passed' : 'BENCH-2 plan validation failed',
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.DIAGNOSTIC_ISSUE),
              body: '```json\n' + JSON.stringify(payload, null, 2) + '\n```',
            });
