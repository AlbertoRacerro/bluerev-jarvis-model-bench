name: Local benchmark preflight

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: read
  issues: write

jobs:
  preflight:
    if: github.ref == 'refs/heads/main'
    concurrency:
      group: local-benchmark-runner
      cancel-in-progress: false
      queue: max
    runs-on: [self-hosted, Windows, X64, bluerev-bench]
    timeout-minutes: 30
    defaults:
      run:
        shell: powershell

    steps:
      - name: Check out trusted default branch
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false
          clean: true

      - name: Capture deterministic tests and local runtime inventory
        run: |
          $env:PYTHONUTF8 = '1'
          $env:PYTHONIOENCODING = 'utf-8'
          python -m scripts.run_preflight_job capture

      - name: Upload immutable preflight artifact
        id: upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preflight-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/preflight/
          if-no-files-found: error
          retention-days: 30

      - name: Enforce preflight gate
        if: always()
        run: python -m scripts.run_preflight_job enforce

      - name: Publish structured result to automation inbox
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          INBOX_ISSUE: "24"
          SUMMARY_PATH: artifacts/preflight/job-summary.json
          PREFLIGHT_PATH: artifacts/preflight/preflight.json
          JOB_STATUS: ${{ job.status }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          ARTIFACT_ID: ${{ steps.upload.outputs.artifact-id }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          ARTIFACT_DIGEST: ${{ steps.upload.outputs.artifact-digest }}
        with:
          script: |
            const fs = require("fs");
            const readJson = (path) => {
              try { return {value: JSON.parse(fs.readFileSync(path, "utf8")), error: null}; }
              catch (error) { return {value: null, error: `${error.name}: ${error.message}`}; }
            };
            const summaryRead = readJson(process.env.SUMMARY_PATH);
            const preflightRead = readJson(process.env.PREFLIGHT_PATH);
            const summary = summaryRead.value;
            const preflight = preflightRead.value;
            const payload = {
              schema_version: "bench.workflow-inbox.v2",
              run_id: Number(context.runId),
              run_attempt: Number(process.env.RUN_ATTEMPT),
              workflow: context.workflow,
              event_name: context.eventName,
              sha: context.sha,
              ref: context.ref,
              job_status: process.env.JOB_STATUS,
              artifact: {
                id: process.env.ARTIFACT_ID || null,
                url: process.env.ARTIFACT_URL || null,
                digest: process.env.ARTIFACT_DIGEST || null,
              },
              tests: summary?.tests ?? null,
              inventory: summary?.inventory ?? null,
              sanitization: summary?.sanitization ?? null,
              preflight: {
                status: preflight?.status ?? null,
                runner_ready: preflight?.runner_ready ?? null,
                scoring_ready: preflight?.scoring_ready ?? null,
                local_only: preflight?.local_only ?? null,
                blocking_reasons: preflight?.blocking_reasons ?? null,
                scoring_blocking_reasons: preflight?.scoring_blocking_reasons ?? null,
                hermes_commit: preflight?.hermes?.commit ?? null,
                hermes_dirty: preflight?.hermes?.dirty ?? null,
                hermes_platform_mode: preflight?.hermes?.platform_mode ?? null,
                hermes_git_bash_ready: preflight?.hermes?.git_bash?.probe?.ok ?? null,
                ollama_model_count: Array.isArray(preflight?.ollama?.models) ? preflight.ollama.models.length : null,
              },
              summary_error: summaryRead.error,
              preflight_error: preflightRead.error,
            };
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.INBOX_ISSUE),
              body: ["<!-- bench-workflow-result-v2 -->", "```json", JSON.stringify(payload, null, 2), "```"].join("\n"),
            });

  benchmark_command_control:
    name: benchmark-command-control
    if: github.ref == 'refs/heads/main'
    concurrency:
      group: benchmark-command-control
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
      actions: write

    steps:
      - name: Dispatch newest authorized benchmark command
        uses: actions/github-script@v7
        with:
          script: |
            const ISSUE_NUMBER = 24;
            const COMMAND_EPOCH_ID = 4951513674;
            const OWNER_LOGIN = 'AlbertoRacerro';
            const OWNER_ID = 293122393;
            const ACTIONS_BOT_ID = 41898282;
            const RECEIPT_MARKER = '<!-- bench-command-receipt-v1 -->';
            const workflows = Object.freeze({
              '/bench preflight': 'local-benchmark.yml',
              '/bench residency': 'local-model-residency.yml',
              '/bench direct-smoke': 'local-direct-smoke.yml',
            });

            const isAuthorizedCommand = (comment) =>
              comment &&
              Number(comment.id) > COMMAND_EPOCH_ID &&
              comment.user?.login === OWNER_LOGIN &&
              Number(comment.user?.id) === OWNER_ID &&
              comment.user?.type === 'User' &&
              comment.author_association === 'OWNER' &&
              Object.hasOwn(workflows, comment.body);

            const receiptSourceId = (comment) => {
              const trustedReceiptAuthor =
                comment?.user?.login === 'github-actions[bot]' &&
                Number(comment?.user?.id) === ACTIONS_BOT_ID &&
                comment?.user?.type === 'Bot';
              if (!trustedReceiptAuthor || !comment?.body?.includes(RECEIPT_MARKER)) {
                return null;
              }
              const match = comment.body.match(/```json\s*([\s\S]*?)\s*```/);
              if (!match) return null;
              try {
                const receipt = JSON.parse(match[1]);
                return receipt.schema_version === 'bench.command-receipt.v1'
                  ? Number(receipt.source_comment_id)
                  : null;
              } catch (_) {
                return null;
              }
            };

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ISSUE_NUMBER,
              per_page: 100,
            });
            const lastConsumedId = Math.max(
              COMMAND_EPOCH_ID,
              ...comments.map(receiptSourceId).filter((id) => Number.isSafeInteger(id))
            );
            const command = comments
              .filter(
                (comment) =>
                  isAuthorizedCommand(comment) &&
                  Number(comment.id) > lastConsumedId
              )
              .sort((left, right) => Number(right.id) - Number(left.id))[0] ?? null;
            if (!command) {
              core.info('no authorized unconsumed benchmark command found');
              return;
            }

            const workflowId = workflows[command.body];
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowId,
              ref: 'main',
            });
            const receipt = {
              schema_version: 'bench.command-receipt.v1',
              command: command.body,
              target_workflow: workflowId,
              ref: 'main',
              source_comment_id: command.id,
              requested_by: command.user.login,
              dispatcher_run_id: context.runId,
              dispatcher_run_attempt: Number(context.runAttempt),
            };
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ISSUE_NUMBER,
              body: `${RECEIPT_MARKER}\n\`\`\`json\n${JSON.stringify(receipt, null, 2)}\n\`\`\``,
            });
