name: Local benchmark preflight

on:
  workflow_dispatch:
  schedule:
    - cron: "*/20 * * * *"

permissions:
  contents: read

concurrency:
  group: local-benchmark-runner
  cancel-in-progress: false

jobs:
  preflight:
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, Windows, X64, bluerev-bench]
    timeout-minutes: 30

    steps:
      - name: Check out trusted default branch
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false

      - name: Capture deterministic tests and local runtime inventory
        shell: cmd
        run: python -m scripts.run_preflight_job capture

      - name: Upload immutable preflight artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preflight-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 30

      - name: Enforce preflight gate
        if: always()
        shell: cmd
        run: python -m scripts.run_preflight_job enforce
