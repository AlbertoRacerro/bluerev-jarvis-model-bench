name: Local benchmark preflight

on:
  workflow_dispatch:
  schedule:
    - cron: "*/20 * * * *"

permissions:
  contents: read

concurrency:
  group: local-benchmark-runner
  cancel-in-progress: false

jobs:
  preflight:
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, Windows, X64, bluerev-bench]
    timeout-minutes: 30

    steps:
      - name: Check out trusted default branch
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false

      - name: Run deterministic contract tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $env:PYTHONPATH = "$PWD$([IO.Path]::PathSeparator)$(Join-Path $PWD 'src')"
          $testOutput = & python -m unittest discover -s tests -v 2>&1
          $testExit = $LASTEXITCODE
          $testOutput | Tee-Object -FilePath artifacts/tests.log
          "exit_code=$testExit" | Add-Content -Path artifacts/tests.log
          "TEST_EXIT_CODE=$testExit" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          exit 0

      - name: Inventory local-only runtime
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $externalKeys = @(
            'OPENAI_API_KEY',
            'ANTHROPIC_API_KEY',
            'OPENROUTER_API_KEY',
            'XAI_API_KEY',
            'DEEPSEEK_API_KEY',
            'GOOGLE_API_KEY',
            'GEMINI_API_KEY',
            'GLM_API_KEY',
            'KIMI_API_KEY',
            'DASHSCOPE_API_KEY'
          )
          foreach ($name in $externalKeys) {
            [Environment]::SetEnvironmentVariable($name, $null, 'Process')
          }
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $inventoryOutput = & python scripts/preflight.py --output artifacts/preflight.json 2>&1
          $inventoryExit = $LASTEXITCODE
          $inventoryOutput | Tee-Object -FilePath artifacts/preflight.log
          "exit_code=$inventoryExit" | Add-Content -Path artifacts/preflight.log
          "INVENTORY_EXIT_CODE=$inventoryExit" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          exit 0

      - name: Upload immutable preflight artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preflight-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 30

      - name: Enforce preflight gate
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:TEST_EXIT_CODE -ne '0') {
            throw "Deterministic contract tests failed with exit code $env:TEST_EXIT_CODE. See tests.log artifact."
          }
          if ($env:INVENTORY_EXIT_CODE -ne '0') {
            throw "Local runtime inventory failed with exit code $env:INVENTORY_EXIT_CODE. See preflight artifacts."
          }
