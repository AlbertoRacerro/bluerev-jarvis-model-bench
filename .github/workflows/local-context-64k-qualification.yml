name: Local Lane 1 Hermes minimum 64K qualification

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  context-64k-qualification:
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        batch: [0, 1, 2, 3, 4]
    concurrency:
      group: local-benchmark-runner
      cancel-in-progress: false
      queue: max
    runs-on: [self-hosted, Windows, X64, bluerev-bench]
    timeout-minutes: 45
    defaults:
      run:
        shell: powershell
    env:
      BENCH_H4_BATCH_INDEX: ${{ matrix.batch }}
    steps:
      - name: Check out trusted default branch
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false
          clean: true
      - name: Capture H4 Hermes minimum 64K batch
        id: capture
        run: |
          $env:PYTHONUTF8 = '1'
          $env:PYTHONIOENCODING = 'utf-8'
          python -m scripts.run_h4_context_bound_job capture
      - name: Upload immutable H4 artifact
        id: upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: context-64k-${{ github.run_id }}-${{ github.run_attempt }}-b${{ matrix.batch }}
          path: artifacts/context-64k-qualification/
          if-no-files-found: error
          retention-days: 30
      - name: Enforce H4 evidence gate
        id: enforce
        if: always()
        run: python -m scripts.run_h4_context_bound_job enforce
      - name: Publish compact H4 result
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          ISSUE: "24"
          STATUS: ${{ job.status }}
          ATTEMPT: ${{ github.run_attempt }}
          BATCH: ${{ matrix.batch }}
          CAPTURE: ${{ steps.capture.outcome }}
          ENFORCE: ${{ steps.enforce.outcome }}
          URL: ${{ steps.upload.outputs.artifact-url }}
          DIGEST: ${{ steps.upload.outputs.artifact-digest }}
        with:
          script: |
            const fs = require('fs');
            const load = (path) => { try { return JSON.parse(fs.readFileSync(path, 'utf8')); } catch (_) { return null; } };
            const summary = load('artifacts/context-64k-qualification/job-summary.json');
            const report = load('artifacts/context-64k-qualification/h4-hermes-minimum-64k/report.json');
            const payload = {
              schema_version: 'bench.h4-context-inbox.v1',
              run_id: Number(context.runId), run_attempt: Number(process.env.ATTEMPT),
              batch_index: Number(process.env.BATCH), sha: context.sha, ref: context.ref,
              job_status: process.env.STATUS,
              phases: {capture: process.env.CAPTURE, enforce: process.env.ENFORCE},
              artifact: {url: process.env.URL || null, digest: process.env.DIGEST || null},
              tests_exit: summary?.tests?.exit_code ?? null,
              probe_exit: summary?.probe?.exit_code ?? null,
              profile: report?.profile ?? null, selection: report?.selection ?? null,
              status_counts: report?.status_counts ?? null,
              required_failures: report?.required_failures ?? null,
              infrastructure_error: report?.infrastructure_error ?? null,
              source: report?.source ?? null,
            };
            await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: Number(process.env.ISSUE), body: '<!-- bench-h4-context-v1 -->\n```json\n' + JSON.stringify(payload, null, 2) + '\n```'});
