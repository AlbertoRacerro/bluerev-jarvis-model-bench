name: Local primary-context qualification

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  context-qualification:
    if: github.ref == 'refs/heads/main'
    concurrency:
      group: local-benchmark-runner
      cancel-in-progress: false
      queue: max
    runs-on: [self-hosted, Windows, X64, bluerev-bench]
    timeout-minutes: 180
    defaults:
      run:
        shell: powershell

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false
          clean: true

      - name: Capture H2 primary 16K qualification
        id: capture
        run: |
          $env:PYTHONUTF8 = '1'
          $env:PYTHONIOENCODING = 'utf-8'
          python -m scripts.run_h2_context_bound_job capture

      - name: Upload immutable H2 artifact
        id: upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: context-qualification-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/context-qualification/
          if-no-files-found: error
          retention-days: 30

      - name: Enforce H2 evidence gate
        id: enforce
        if: always()
        run: python -m scripts.run_h2_context_bound_job enforce

      - name: Publish compact H2 result
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          ISSUE: "24"
          STATUS: ${{ job.status }}
          ATTEMPT: ${{ github.run_attempt }}
          CAPTURE: ${{ steps.capture.outcome }}
          ENFORCE: ${{ steps.enforce.outcome }}
          URL: ${{ steps.upload.outputs.artifact-url }}
          DIGEST: ${{ steps.upload.outputs.artifact-digest }}
        with:
          script: |
            const fs = require('fs');
            const load = (path) => {
              try { return JSON.parse(fs.readFileSync(path, 'utf8')); }
              catch (_) { return null; }
            };
            const summary = load('artifacts/context-qualification/job-summary.json');
            const report = load(
              'artifacts/context-qualification/h2-primary-16k/report.json'
            );
            const payload = {
              schema_version: 'bench.h2-context-inbox.v1',
              run_id: Number(context.runId),
              run_attempt: Number(process.env.ATTEMPT),
              sha: context.sha,
              ref: context.ref,
              job_status: process.env.STATUS,
              phases: {
                capture: process.env.CAPTURE,
                enforce: process.env.ENFORCE,
              },
              artifact: {
                url: process.env.URL || null,
                digest: process.env.DIGEST || null,
              },
              tests_exit: summary?.tests?.exit_code ?? null,
              probe_exit: summary?.probe?.exit_code ?? null,
              profile: report?.profile ?? null,
              candidate_count: report?.candidate_count ?? null,
              status_counts: report?.status_counts ?? null,
              required_failures: report?.required_failures ?? null,
              infrastructure_error: report?.infrastructure_error ?? null,
              source: report?.source ?? null,
              repository: report?.repository ?? null,
            };
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE),
              body: '<!-- bench-h2-context-v1 -->\n```json\n' +
                JSON.stringify(payload, null, 2) + '\n```',
            });
