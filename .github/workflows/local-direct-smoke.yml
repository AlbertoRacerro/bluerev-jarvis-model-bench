name: Local direct-model smoke

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/local-direct-smoke.yml"
      - "candidates/models.local.json"
      - "fixtures/bench-1/**"
      - "scripts/benchmark_runtime.py"
      - "scripts/preflight.py"
      - "scripts/run_direct_smoke*.py"
      - "src/bench/**"
      - "tests/test_benchmark_runtime.py"
      - "tests/test_preflight.py"
      - "tests/test_direct_execution*.py"
      - "tests/test_run_direct_smoke*.py"

permissions:
  contents: read
  issues: write

jobs:
  announce:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - name: Publish queued lifecycle metadata
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          INBOX_ISSUE: "24"
          RUN_ATTEMPT: ${{ github.run_attempt }}
        with:
          script: |
            const payload = {
              schema_version: "bench.workflow-lifecycle.v1",
              lifecycle: "queued",
              run_id: Number(context.runId),
              run_attempt: Number(process.env.RUN_ATTEMPT),
              workflow: context.workflow,
              event_name: context.eventName,
              sha: context.sha,
              ref: context.ref,
              html_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            };
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.INBOX_ISSUE),
              body: ["<!-- bench-workflow-lifecycle-v1 -->", "```json", JSON.stringify(payload, null, 2), "```"].join("\n"),
            });

  direct-smoke:
    if: github.ref == 'refs/heads/main'
    concurrency:
      group: local-benchmark-runner
      cancel-in-progress: false
      queue: max
    runs-on: [self-hosted, Windows, X64, bluerev-bench]
    timeout-minutes: 25
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out trusted default branch
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false
          clean: true

      - name: Capture tests, preflight, and bounded direct execution
        run: |
          $ErrorActionPreference = 'Stop'
          $env:PYTHONUTF8 = '1'
          $env:PYTHONIOENCODING = 'utf-8'
          & python -m scripts.run_direct_smoke_v3_job capture
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload immutable direct-smoke artifact
        id: upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: direct-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/direct-smoke/
          if-no-files-found: error
          retention-days: 30

      - name: Enforce infrastructure and evidence gate
        if: always()
        run: |
          $ErrorActionPreference = 'Stop'
          & python -m scripts.run_direct_smoke_v3_job enforce
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Publish structured result to automation inbox
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          INBOX_ISSUE: "24"
          SUMMARY_PATH: artifacts/direct-smoke/job-summary.json
          JOB_STATUS: ${{ job.status }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          ARTIFACT_ID: ${{ steps.upload.outputs.artifact-id }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          ARTIFACT_DIGEST: ${{ steps.upload.outputs.artifact-digest }}
        with:
          script: |
            const fs = require("fs");
            let summary = null;
            let summaryError = null;
            try { summary = JSON.parse(fs.readFileSync(process.env.SUMMARY_PATH, "utf8")); }
            catch (error) { summaryError = `${error.name}: ${error.message}`; }
            const execution = summary?.execution ?? {};
            const payload = {
              schema_version: "bench.workflow-inbox.v2",
              run_id: Number(context.runId),
              run_attempt: Number(process.env.RUN_ATTEMPT),
              workflow: context.workflow,
              event_name: context.eventName,
              sha: context.sha,
              ref: context.ref,
              job_status: process.env.JOB_STATUS,
              artifact: {
                id: process.env.ARTIFACT_ID || null,
                url: process.env.ARTIFACT_URL || null,
                digest: process.env.ARTIFACT_DIGEST || null,
              },
              tests: summary?.tests ?? null,
              inventory: summary?.inventory ?? null,
              sanitization: summary?.sanitization ?? null,
              execution: {
                infrastructure_exit_code: execution.infrastructure_exit_code ?? null,
                execution_completed: execution.execution_completed ?? null,
                candidate_id: execution.candidate_id ?? null,
                case_id: execution.case_id ?? null,
                candidate_result_status: execution.candidate_result_status ?? null,
                candidate_passed: execution.candidate_passed ?? null,
                termination_reason: execution.termination_reason ?? null,
                eval_count: execution.eval_count ?? null,
                num_predict: execution.num_predict ?? null,
                case_definition_sha256: execution.case_definition_sha256 ?? null,
                manifest_sha256: execution.manifest_sha256 ?? null,
                skipped_reason: execution.skipped_reason ?? null,
                error: execution.error ?? null,
              },
              summary_error: summaryError,
            };
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.INBOX_ISSUE),
              body: ["<!-- bench-workflow-result-v2 -->", "```json", JSON.stringify(payload, null, 2), "```"].join("\n"),
            });
