name: Local direct-model smoke

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/local-direct-smoke.yml"
      - "candidates/models.local.json"
      - "fixtures/bench-1/**"
      - "scripts/benchmark_runtime.py"
      - "scripts/preflight.py"
      - "scripts/preflight_v2.py"
      - "scripts/probe_model_residency.py"
      - "scripts/probe_model_residency_v2.py"
      - "scripts/run_direct_smoke*.py"
      - "src/bench/**"
      - "tests/test_preflight.py"
      - "tests/test_preflight_v2.py"
      - "tests/test_probe_model_residency_v2.py"
      - "tests/test_direct_execution*.py"
      - "tests/test_run_direct_smoke*.py"

permissions:
  contents: read
  issues: write

jobs:
  direct-smoke:
    if: github.ref == 'refs/heads/main'
    concurrency:
      group: local-benchmark-runner
      cancel-in-progress: false
      queue: max
    runs-on: [self-hosted, Windows, X64, bluerev-bench]
    timeout-minutes: 25
    defaults:
      run:
        shell: powershell
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false
          clean: true
      - name: Capture bounded direct execution
        run: |
          $env:PYTHONUTF8 = '1'
          $env:PYTHONIOENCODING = 'utf-8'
          python -m scripts.run_direct_smoke_v3_job capture
      - name: Upload immutable artifact
        id: upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: direct-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/direct-smoke/
          if-no-files-found: error
          retention-days: 30
      - name: Enforce evidence gate
        if: always()
        run: python -m scripts.run_direct_smoke_v3_job enforce
      - name: Publish compact result
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          ISSUE: "24"
          SUMMARY: artifacts/direct-smoke/job-summary.json
          STATUS: ${{ job.status }}
          ATTEMPT: ${{ github.run_attempt }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          ARTIFACT_DIGEST: ${{ steps.upload.outputs.artifact-digest }}
        with:
          script: |
            const fs = require('fs');
            let summary = null, error = null;
            try { summary = JSON.parse(fs.readFileSync(process.env.SUMMARY, 'utf8')); }
            catch (e) { error = `${e.name}: ${e.message}`; }
            const payload = {
              schema_version: 'bench.workflow-inbox.v2',
              run_id: Number(context.runId),
              run_attempt: Number(process.env.ATTEMPT),
              sha: context.sha,
              ref: context.ref,
              job_status: process.env.STATUS,
              artifact: {url: process.env.ARTIFACT_URL || null, digest: process.env.ARTIFACT_DIGEST || null},
              tests: summary?.tests ?? null,
              inventory: summary?.inventory ?? null,
              sanitization: summary?.sanitization ?? null,
              execution: summary?.execution ?? null,
              summary_error: error,
            };
            await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: Number(process.env.ISSUE), body: `<!-- bench-workflow-result-v2 -->\n\`\`\`json\n${JSON.stringify(payload, null, 2)}\n\`\`\``});
