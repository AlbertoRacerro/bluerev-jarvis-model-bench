name: Local model residency qualification

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/local-model-residency.yml"
      - "scripts/benchmark_runtime.py"
      - "scripts/run_residency_job.py"
      - "scripts/probe_model_residency.py"
      - "scripts/build_residency_shortlist.py"
      - "scripts/build_h2_context_plan.py"
      - "tests/test_probe_model_residency.py"
      - "tests/test_build_residency_shortlist.py"
      - "tests/test_residency_shortlist_binding.py"
      - "tests/test_build_h2_context_plan.py"
      - "candidates/models.local.json"

permissions:
  contents: read
  issues: write

jobs:
  announce:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/github-script@v7
        continue-on-error: true
        env:
          INBOX_ISSUE: "24"
        with:
          script: |
            const payload = {
              schema_version: "bench.workflow-lifecycle.v1",
              lifecycle: "queued",
              run_id: Number(context.runId),
              run_attempt: Number(context.runAttempt ?? process.env.GITHUB_RUN_ATTEMPT ?? 1),
              workflow: context.workflow,
              sha: context.sha,
              ref: context.ref,
            };
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.INBOX_ISSUE),
              body: ["<!-- bench-workflow-lifecycle-v1 -->", "```json", JSON.stringify(payload, null, 2), "```"].join("\n"),
            });

  residency:
    if: github.ref == 'refs/heads/main'
    concurrency:
      group: local-benchmark-runner
      cancel-in-progress: false
      queue: max
    runs-on: [self-hosted, Windows, X64, bluerev-bench]
    timeout-minutes: 180
    defaults:
      run:
        shell: powershell

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false
          clean: true

      - name: Prepare artifact directory
        run: |
          $env:PYTHONUTF8 = '1'
          $env:PYTHONIOENCODING = 'utf-8'
          python -m scripts.run_residency_job prepare

      - name: Run deterministic tests
        id: tests
        run: python -m scripts.run_residency_job tests

      - name: Run sequential residency probe
        id: probe
        run: python -m scripts.run_residency_job probe

      - name: Validate evidence and shortlist
        id: shortlist
        run: python -m scripts.run_residency_job shortlist

      - name: Build bound H2 plan
        id: h2_plan
        run: python -m scripts.run_residency_job h2-plan

      - name: Upload immutable artifact
        id: upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-residency-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/model-residency/
          if-no-files-found: error
          retention-days: 30

      - name: Publish structured result
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          INBOX_ISSUE: "24"
          ROOT_PATH: artifacts/model-residency
          JOB_STATUS: ${{ job.status }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          TESTS_OUTCOME: ${{ steps.tests.outcome }}
          PROBE_OUTCOME: ${{ steps.probe.outcome }}
          SHORTLIST_OUTCOME: ${{ steps.shortlist.outcome }}
          H2_PLAN_OUTCOME: ${{ steps.h2_plan.outcome }}
          ARTIFACT_ID: ${{ steps.upload.outputs.artifact-id }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          ARTIFACT_DIGEST: ${{ steps.upload.outputs.artifact-digest }}
        with:
          script: |
            const fs = require("fs");
            const path = require("path");
            const read = (name) => {
              try { return {value: JSON.parse(fs.readFileSync(path.join(process.env.ROOT_PATH, name), "utf8")), error: null}; }
              catch (error) { return {value: null, error: `${error.name}: ${error.message}`}; }
            };
            const report = read("report.json");
            const shortlist = read("shortlist.json");
            const plan = read("h2-context-plan.json");
            const names = (items) => (items ?? []).map((item) => ({
              name: item?.name ?? item?.model?.name ?? null,
              digest: item?.digest ?? item?.model?.digest ?? null,
              classification: item?.classification ?? null,
              deferred_reason: item?.deferred_reason ?? null,
              canonical_name: item?.canonical_name ?? null,
            }));
            const payload = {
              schema_version: "bench.model-residency-inbox.v5",
              run_id: Number(context.runId),
              run_attempt: Number(process.env.RUN_ATTEMPT),
              sha: context.sha,
              ref: context.ref,
              job_status: process.env.JOB_STATUS,
              phases: {
                tests: process.env.TESTS_OUTCOME || null,
                probe: process.env.PROBE_OUTCOME || null,
                shortlist: process.env.SHORTLIST_OUTCOME || null,
                h2_plan: process.env.H2_PLAN_OUTCOME || null,
              },
              artifact: {
                id: process.env.ARTIFACT_ID || null,
                url: process.env.ARTIFACT_URL || null,
                digest: process.env.ARTIFACT_DIGEST || null,
              },
              infrastructure_error: report.value?.infrastructure_error ?? null,
              classification_counts: report.value?.classification_counts ?? null,
              models: names(report.value?.models),
              shortlist: {
                status: shortlist.value?.status ?? null,
                counts: shortlist.value?.counts ?? null,
                primary_h2: names(shortlist.value?.primary_h2),
                secondary_partial_vram: names(shortlist.value?.secondary_partial_vram),
                deferred: names(shortlist.value?.deferred),
              },
              h2_plan: {status: plan.value?.status ?? null, counts: plan.value?.counts ?? null},
              errors: {report: report.error, shortlist: shortlist.error, h2_plan: plan.error},
            };
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.INBOX_ISSUE),
              body: ["<!-- bench-model-residency-v5 -->", "```json", JSON.stringify(payload, null, 2), "```"].join("\n"),
            });
