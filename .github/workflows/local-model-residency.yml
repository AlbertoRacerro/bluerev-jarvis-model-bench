name: Local model residency qualification
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/local-model-residency.yml"
      - "scripts/benchmark_runtime.py"
      - "scripts/run_residency_job.py"
      - "scripts/probe_model_residency.py"
      - "scripts/build_residency_shortlist.py"
      - "scripts/build_h2_context_plan.py"
      - "tests/test_benchmark_runtime.py"
      - "tests/test_probe_model_residency.py"
      - "tests/test_build_residency_shortlist.py"
      - "tests/test_residency_shortlist_binding.py"
      - "tests/test_build_h2_context_plan.py"
      - "candidates/models.local.json"
permissions:
  contents: read
  issues: write
jobs:
  residency:
    if: github.ref == 'refs/heads/main'
    concurrency:
      group: local-benchmark-runner
      cancel-in-progress: false
      queue: max
    runs-on: [self-hosted, Windows, X64, bluerev-bench]
    timeout-minutes: 180
    defaults:
      run:
        shell: powershell
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false
          clean: true
      - name: Prepare
        run: |
          $env:PYTHONUTF8 = '1'
          $env:PYTHONIOENCODING = 'utf-8'
          python -m scripts.run_residency_job prepare
      - name: Tests
        id: tests
        run: python -m scripts.run_residency_job tests
      - name: Probe
        id: probe
        run: python -m scripts.run_residency_job probe
      - name: Shortlist
        id: shortlist
        run: python -m scripts.run_residency_job shortlist
      - name: H2 plan
        id: h2
        run: python -m scripts.run_residency_job h2-plan
      - name: Upload artifact
        id: upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-residency-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/model-residency/
          if-no-files-found: error
          retention-days: 30
      - name: Publish result
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          ISSUE: "24"
          STATUS: ${{ job.status }}
          ATTEMPT: ${{ github.run_attempt }}
          TESTS: ${{ steps.tests.outcome }}
          PROBE: ${{ steps.probe.outcome }}
          SHORTLIST: ${{ steps.shortlist.outcome }}
          H2: ${{ steps.h2.outcome }}
          URL: ${{ steps.upload.outputs.artifact-url }}
          DIGEST: ${{ steps.upload.outputs.artifact-digest }}
        with:
          script: |
            const fs = require('fs');
            const load = (p) => { try { return JSON.parse(fs.readFileSync(p, 'utf8')); } catch (_) { return null; } };
            const report = load('artifacts/model-residency/report.json');
            const shortlist = load('artifacts/model-residency/shortlist.json');
            const plan = load('artifacts/model-residency/h2-context-plan.json');
            const payload = {
              schema_version: 'bench.model-residency-inbox.v5',
              run_id: Number(context.runId), run_attempt: Number(process.env.ATTEMPT), sha: context.sha,
              job_status: process.env.STATUS,
              phases: {tests: process.env.TESTS, probe: process.env.PROBE, shortlist: process.env.SHORTLIST, h2_plan: process.env.H2},
              artifact: {url: process.env.URL || null, digest: process.env.DIGEST || null},
              infrastructure_error: report?.infrastructure_error ?? null,
              classification_counts: report?.classification_counts ?? null,
              shortlist_counts: shortlist?.counts ?? null,
              h2_counts: plan?.counts ?? null
            };
            await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: Number(process.env.ISSUE), body: '<!-- bench-model-residency-v5 -->\n```json\n' + JSON.stringify(payload, null, 2) + '\n```'});
