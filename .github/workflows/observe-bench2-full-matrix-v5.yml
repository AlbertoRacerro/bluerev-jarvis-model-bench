name: Observe BENCH-2 full matrix v5

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  snapshot:
    if: github.head_ref == 'ops/observe-bench2-full-matrix-v5'
    runs-on: ubuntu-latest
    steps:
      - name: Read activation run
        uses: actions/github-script@v7
        env:
          ACTIVATION_SHA: deb7ae4c6ccbd80b1c14f65d3722c6cc2268fa70
          WORKFLOW_NAME: BENCH-2 Hermes full matrix
        with:
          script: |
            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              event: 'push',
              head_sha: process.env.ACTIVATION_SHA,
              per_page: 100
            });
            const matches = runs.filter(r => r.name === process.env.WORKFLOW_NAME);
            if (matches.length !== 1) {
              core.setFailed(`Expected exactly one v5 run, found ${matches.length}`);
              return;
            }
            const run = matches[0];
            const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id,
              filter: 'latest',
              per_page: 100
            });
            const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id,
              per_page: 100
            });
            core.info(JSON.stringify({
              run: {id: run.id, attempt: run.run_attempt, status: run.status, conclusion: run.conclusion, head_sha: run.head_sha, html_url: run.html_url},
              jobs: jobs.map(j => ({id: j.id, name: j.name, status: j.status, conclusion: j.conclusion, runner_name: j.runner_name, steps: (j.steps || []).map(s => ({name: s.name, status: s.status, conclusion: s.conclusion}))})),
              artifacts: artifacts.map(a => ({id: a.id, name: a.name, size_in_bytes: a.size_in_bytes, digest: a.digest, expired: a.expired}))
            }, null, 2));
