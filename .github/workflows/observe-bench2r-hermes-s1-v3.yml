name: Observe BENCH-2R Hermes S1 v3

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  snapshot:
    if: github.head_ref == 'ops/observe-bench2r-s1-v3'
    runs-on: ubuntu-latest
    steps:
      - name: Read S1 v3 activation run
        uses: actions/github-script@v7
        env:
          ACTIVATION_SHA: 526d27183a774ecb628230ff69608b29a5d0a4b7
          WORKFLOW_NAME: BENCH-2R Hermes S1 observed preflight
        with:
          script: |
            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              event: 'push',
              head_sha: process.env.ACTIVATION_SHA,
              per_page: 100
            });
            const matches = runs.filter(r => r.name === process.env.WORKFLOW_NAME);
            if (matches.length !== 1) {
              core.setFailed(`Expected exactly one S1 v3 run, found ${matches.length}`);
              return;
            }
            const run = matches[0];
            const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id,
              filter: 'latest',
              per_page: 100
            });
            const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id,
              per_page: 100
            });
            core.info(JSON.stringify({
              run: {
                id: run.id,
                attempt: run.run_attempt,
                status: run.status,
                conclusion: run.conclusion,
                head_sha: run.head_sha,
                html_url: run.html_url,
                created_at: run.created_at,
                updated_at: run.updated_at
              },
              jobs: jobs.map(j => ({
                id: j.id,
                name: j.name,
                status: j.status,
                conclusion: j.conclusion,
                runner_name: j.runner_name,
                started_at: j.started_at,
                completed_at: j.completed_at,
                steps: (j.steps || []).map(s => ({
                  name: s.name,
                  status: s.status,
                  conclusion: s.conclusion
                }))
              })),
              artifacts: artifacts.map(a => ({
                id: a.id,
                name: a.name,
                size_in_bytes: a.size_in_bytes,
                digest: a.digest,
                expired: a.expired
              }))
            }, null, 2));
