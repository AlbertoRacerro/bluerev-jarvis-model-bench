name: Patch S3A-R1 Windows EOL boundary

on:
  push:
    branches: [bench2r/s3a-r1-windows-eol-boundary]
    paths:
      - .github/workflows/s3a-r1-eol-patcher.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Apply exact validator patch
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = 'bench2r/s3a-r1-windows-eol-boundary';
            const path = 'scripts/validate_bench2r_hermes_s3a_r1_repair_runtime.py';
            const response = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
            const current = Buffer.from(response.data.content, 'base64').toString('utf8');
            const importBefore = `from pathlib import Path
            from typing import Any
            `;
            const importAfter = `from contextlib import contextmanager
            from pathlib import Path
            from typing import Any, Iterator
            `;
            const bodyBefore = `def git_blob_sha(path: Path) -> str:
                data = path.read_bytes()
                return hashlib.sha1(f"blob {len(data)}\\0".encode("ascii") + data).hexdigest()


            def _validate_design_core() -> dict[str, Any]:
                closeout = design._validate_closeout()
                design._validate_marker()
                design._validate_case_bindings()
                design._validate_skills()
                return design._validate_plan(closeout)
            `;
            const bodyAfter = `def git_blob_sha(path: Path) -> str:
                raw = path.read_bytes()
                try:
                    text = raw.decode("utf-8")
                except UnicodeDecodeError:
                    data = raw
                else:
                    data = text.replace("\\r\\n", "\\n").replace("\\r", "\\n").encode("utf-8")
                return hashlib.sha1(f"blob {len(data)}\\0".encode("ascii") + data).hexdigest()


            @contextmanager
            def windows_text_blob_boundary() -> Iterator[None]:
                original = design._git_blob_sha
                design._git_blob_sha = git_blob_sha
                try:
                    yield
                finally:
                    design._git_blob_sha = original


            def _validate_design_core() -> dict[str, Any]:
                with windows_text_blob_boundary():
                    closeout = design._validate_closeout()
                    design._validate_marker()
                    design._validate_case_bindings()
                    design._validate_skills()
                    return design._validate_plan(closeout)
            `;
            function count(text, token) {
              return text.split(token).length - 1;
            }
            if (count(current, importBefore) !== 1) {
              core.setFailed(`import patch expected once, observed ${count(current, importBefore)}`);
              return;
            }
            if (count(current, bodyBefore) !== 1) {
              core.setFailed(`body patch expected once, observed ${count(current, bodyBefore)}`);
              return;
            }
            const updated = current
              .replace(importBefore, importAfter)
              .replace(bodyBefore, bodyAfter);
            if (updated === current) {
              core.setFailed('validator patch produced no change');
              return;
            }
            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              branch,
              sha: response.data.sha,
              message: 'Normalize S3A-R1 Windows text blob hashes',
              content: Buffer.from(updated, 'utf8').toString('base64'),
            });
